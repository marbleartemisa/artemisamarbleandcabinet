<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Artemisa Marble - Viewer Mejorado</title>

<!-- Fancybox 4 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css"/>

<style>
body { font-family: 'Inter', sans-serif; margin:0; padding:0; background:#f8f8f8;}
header { background:#000; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;}
header nav a { color:#fff; margin:0 12px; text-decoration:none; font-weight:500; }
header nav a:hover { text-decoration:underline; }

.filters { text-align:center; margin:20px 0; }
.filters button { padding:10px 20px; margin:5px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:4px; transition:0.3s;}
.filters button.active, .filters button:hover { background:#f15a24; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  max-width:1200px;
  margin:0 auto;
  padding:10px;
}

.grid-item {
  cursor:pointer;
  position: relative; /* 👈 ESTA ES LA CLAVE */
}

.grid-item img {
  width:100%;
  border-radius:10px;
  transition: transform 0.2s ease;
}

.grid-item img:hover {
  transform: scale(1.03);
}

.form-group {
  display:flex;
  flex-direction:column;
  margin-bottom:12px;
}

.form-group label {
  font-size:12px;
  color:#555;
  margin-bottom:4px;
}

.form-group input,
.form-group textarea {
  padding:8px;
  border-radius:6px;
  border:1px solid #ddd;
  font-size:14px;
}

.form-group textarea {
  resize:vertical;
  min-height:60px;
}

.grid-2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* 🔥 EFECTO 3D */
.fancybox__content {
  perspective: 1000px;
}

.fancybox__content img {
  transition: transform 0.1s ease;
  transform-style: preserve-3d;
  will-change: transform;
}
</style>
</head>

<body>

<header>
  <div class="logo"><img src="/artemisamarbleandcabinet/logo.png" height="100"></div>
  <nav>
    <a href="/artemisamarbleandcabinet/">Home</a>
    <a href="/artemisamarbleandcabinet/aboutus/">About Us</a>
    <a href="/artemisamarbleandcabinet/kitchen/">Kitchen</a>
    <a href="/artemisamarbleandcabinet/bathroom/">Bathroom</a>
    <a href="/artemisamarbleandcabinet/cabinets/">Cabinets</a>
    <a href="/artemisamarbleandcabinet/closets">Closets</a>
    <a href="/artemisamarbleandcabinet/contacts">Contact</a>
    <a class="portal-btn" href="https://marbleartemisa.github.io/sop-site/">Portal-SOP</a>
  </nav>
</header>
<div style="text-align:center;margin:10px;">
  <button id="adminLoginBtn" style="padding:8px 16px;background:#f15a24;color:white;border:none;border-radius:5px;cursor:pointer;">
    Ingresar clave Admin
  </button>
</div>
<div class="filters"></div>

<!-- 🔎 SEARCH BAR (AQUÍ) -->
<div style="text-align:center;margin:10px;">
  <input id="searchBox" placeholder="Search images..." 
  style="padding:10px;width:250px;border-radius:6px;border:1px solid #ccc;">
</div>

<div class="grid" id="gallery"></div>

<!-- Fancybox -->
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";
let photos = [];
const PAGE_SIZE = 60;
let currentIndex = 0;
let currentCategory = 'all';

const gallery = document.getElementById('gallery');
const filtersContainer = document.querySelector('.filters');
const searchBox = document.getElementById("searchBox");

let isAdmin = false;

document.getElementById('adminLoginBtn').addEventListener('click', () => {
  const clave = prompt("Ingrese la clave de administrador:");
  if(clave === "Artemisa2026"){ // cambiar por tu clave real
    isAdmin = true;
    alert("Modo administrador activado");
    renderGallery(currentCategory, true); // refresca la galería para mostrar lápices
  } else {
    alert("Clave incorrecta");
  }
});

searchBox.addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  renderSearch(value);
});
  
const priorityOrder = ["Kitchen","Bathroom","Laundry","Closets & Shelves","Outdoor","BBQ Area","Office","Powder Room","Fireplace","Wall TV","Front desk"];


async function loadPhotos(){

  const cached = localStorage.getItem('photos');

  if(cached){
    photos = JSON.parse(cached);
  } else {
    const res = await fetch(API);
    const data = await res.json();
    photos = data;
    localStorage.setItem('photos', JSON.stringify(data));
  }

  photos = photos.filter(item => !item.PARENTCHILD);

  createFilters();
  renderGallery();
}

  
function createFilters(){
  const tipos = [...new Set(photos.map(p=>p.TIPO).filter(Boolean))];

  filtersContainer.innerHTML = `<button class="filter-btn active" data-category="all">All</button>`;

  tipos.forEach(tipo=>{
    const btn = document.createElement('button');
    btn.className = "filter-btn";
    btn.dataset.category = tipo;
    btn.textContent = tipo;
    filtersContainer.appendChild(btn);
  });

  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
     renderGallery(btn.dataset.category, true);
    });
  });
}

function renderGallery(category='all', reset=true){

  if(reset){
    gallery.innerHTML = '';
    currentIndex = 0;
    currentCategory = category;
  }

  const filtered = photos.filter(p => category==='all' || p.TIPO===category);

  const slice = filtered.slice(currentIndex, currentIndex + PAGE_SIZE);

  slice.forEach(p=>{

    let fileId = null;

    if(p.LINK.includes("drive.google.com")){
      const match = p.LINK.match(/id=([^&]+)/);
      if(match) fileId = match[1];
    }

    if(!fileId || !p.LINK) return;

      // filtro básico de links inválidos
      if(
        p.LINK.includes("undefined") ||
        p.LINK.includes("null") ||
        p.LINK.length < 10
      ) return;

    const thumb = `https://lh3.googleusercontent.com/d/${fileId}=w600`;
    const full  = `https://lh3.googleusercontent.com/d/${fileId}=w2000`;

    const item = document.createElement('div');
    item.classList.add('grid-item');
   let editButton = '';

if(isAdmin){
    editButton = `<button style="
        position:absolute;
        top:8px;
        right:8px;
        padding:6px 8px;
        background:#f15a24;
        color:white;
        border:none;
        border-radius:6px;
        cursor:pointer;
        z-index:999;
        box-shadow:0 2px 6px rgba(0,0,0,0.3);
    "
    onclick="event.stopPropagation(); editPhoto('${p.ID}')"
    >✏️</button>`;
} // 👈 ESTA LLAVE FALTABA


    
        item.innerHTML = `
          <a data-fancybox="gallery" href="${full}">
            <img src="${thumb}" loading="lazy" onerror="this.parentElement.parentElement.remove()">
          </a>
          ${editButton}
        `;

    gallery.appendChild(item);
  });

  currentIndex += PAGE_SIZE;

  Fancybox.bind("[data-fancybox='gallery']", {
    dragToClose: false,
    infinite: true,
    Toolbar: { display: ["zoom","close"] },
    Image: { zoom: true, Pan: true, wheel: "zoom" }
  });
}

loadPhotos();

function renderSearch(query){

  gallery.innerHTML = '';
  currentIndex = 0;

  const filtered = photos.filter(p => {
    return (
      (p.TIPO && p.TIPO.toLowerCase().includes(query)) ||
      (p.LINK && p.LINK.toLowerCase().includes(query))
    );
  });

  filtered.slice(0, 120).forEach(p => {

    let fileId = p.LINK.match(/id=([^&]+)/)?.[1];
    if(!fileId) return;

    const thumb = `https://lh3.googleusercontent.com/d/${fileId}=w400`;
    const full  = `https://lh3.googleusercontent.com/d/${fileId}=w2000`;

    const item = document.createElement('div');
    item.className = 'grid-item';

    item.innerHTML = `
      <a data-fancybox="gallery" href="${full}">
        <img src="${thumb}" loading="lazy"
        onerror="this.parentElement.parentElement.remove()">
      </a>
    `;

    gallery.appendChild(item);
  });

  Fancybox.bind("[data-fancybox='gallery']", {});
}



function editPhoto(photoID) {
  const photo = photos.find(p => p.ID === photoID);
  if (!photo) return;

  // Cerrar modal anterior si existe
  const existing = document.getElementById('editModal');
  if (existing) existing.remove();

  const formHtml = `
    <div id="editModal" style="
      position:fixed; top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display:flex; justify-content:center; align-items:center;
      z-index:9999;
    ">
      <div style="
        background:#ffffff; border-radius:16px;
        width:420px; max-height:90vh; overflow-y:auto;
        padding:20px; box-shadow:0 10px 40px rgba(0,0,0,0.25);
        font-family:Inter, sans-serif; position:relative;
      ">
        <h2 style="margin-top:0;font-size:20px;">Editar Imagen</h2>
        <p style="font-size:12px;color:#777;margin-bottom:15px;">ID: ${photo.ID}</p>

        <div class="form-group">
          <label>Stone</label>
          <input id="STONE" value="${photo.STONE || ''}">
        </div>

        <div class="form-group">
          <label>Proyecto</label>
          <input id="PROYECTO" value="${photo.PROYECTO || ''}">
        </div>

        <div class="form-group">
          <label>Memo</label>
          <textarea id="MEMO">${photo.MEMO || ''}</textarea>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>Tipo</label>
            <input id="TIPO" value="${photo.TIPO || ''}">
          </div>
          <div class="form-group">
            <label>Subtipo</label>
            <input id="SUBTIPO" value="${photo.SUBTIPO || ''}">
          </div>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>Colores</label>
            <input id="COLOURS" value="${photo.COLOURS || ''}">
          </div>
          <div class="form-group">
            <label>Materiales</label>
            <input id="MATERIALES" value="${photo.MATERIALES || ''}">
          </div>
        </div>

        <div class="form-group">
          <label>Looking For (keywords)</label>
          <input id="LOOKINGFOR" value="${photo.LOOKINGFOR || ''}">
        </div>

        <div style="display:flex; gap:10px; margin-top:20px;">
          <button onclick="savePhoto('${photoID}')" style="
            flex:1; background:#f15a24; color:white;
            border:none; padding:10px; border-radius:8px;
            cursor:pointer; font-weight:600; position:relative;
          ">
            💾 Guardar
            <span id="spinner" style="
              display:none; position:absolute; right:10px; top:50%;
              transform:translateY(-50%);
            ">⏳</span>
          </button>
        </div>

        <button onclick="document.getElementById('editModal').remove()" style="
          position:absolute; top:10px; right:10px;
          background:none; border:none; font-size:18px; cursor:pointer;
        ">✖</button>
      </div>
    </div>
  `;

  document.body.insertAdjacentHTML('beforeend', formHtml);
}

  
  function showToast(msg){
  const toast = document.createElement('div');
  toast.textContent = msg;
  toast.style.position = 'fixed';
  toast.style.bottom = '20px';
  toast.style.left = '50%';
  toast.style.transform = 'translateX(-50%)';
  toast.style.background = '#333';
  toast.style.color = '#fff';
  toast.style.padding = '12px 20px';
  toast.style.borderRadius = '8px';
  toast.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
  toast.style.opacity = '0';
  toast.style.transition = 'opacity 0.3s';
  document.body.appendChild(toast);

  requestAnimationFrame(()=>toast.style.opacity = '1');

  setTimeout(()=>{
    toast.style.opacity = '0';
    setTimeout(()=>toast.remove(), 300);
  }, 2000);
}


  function savePhoto(photoID){
  const saveBtn = document.getElementById(`saveBtn_${photoID}`);
  const spinner = document.getElementById(`spinner_${photoID}`);

  // Mostramos spinner y deshabilitamos botón
  if(saveBtn) saveBtn.disabled = true;
  if(spinner) spinner.style.display = 'inline';

  // Recopilamos datos
  const params = new URLSearchParams({
    action: 'update',
    ID: photoID,
    STONE: document.getElementById(`STONE_${photoID}`).value,
    MEMO: document.getElementById(`MEMO_${photoID}`).value,
    COLOURS: document.getElementById(`COLOURS_${photoID}`).value,
    MATERIALES: document.getElementById(`MATERIALES_${photoID}`).value,
    LOOKINGFOR: document.getElementById(`LOOKINGFOR_${photoID}`).value,
    TIPO: document.getElementById(`TIPO_${photoID}`).value,
    SUBTIPO: document.getElementById(`SUBTIPO_${photoID}`).value
  });

  fetch(`${API}?${params.toString()}`)
    .then(res => res.json())
    .then(resp => {
      if(saveBtn) saveBtn.disabled = false;
      if(spinner) spinner.style.display = 'none';

      if(resp.success){
        alert("Datos guardados ✅");

        // Actualizamos el objeto en memoria para que la galería esté sincronizada
        const photo = photos.find(p => p.ID === photoID);
        if(photo){
          photo.STONE      = params.get('STONE');
          photo.MEMO       = params.get('MEMO');
          photo.COLOURS    = params.get('COLOURS');
          photo.MATERIALES = params.get('MATERIALES');
          photo.LOOKINGFOR = params.get('LOOKINGFOR');
          photo.TIPO       = params.get('TIPO');
          photo.SUBTIPO    = params.get('SUBTIPO');
        }

        // Cerramos modal
        const modal = document.getElementById('editModal');
        if(modal) modal.remove();

      } else {
        alert("Error guardando ❌");
      }
    })
    .catch(err => {
      if(saveBtn) saveBtn.disabled = false;
      if(spinner) spinner.style.display = 'none';
      alert("Error de conexión ❌");
      console.error(err);
    });
}

// 🔥 EFECTO 3D (AQUÍ VA EXACTAMENTE)
document.addEventListener("mousemove", (e) => {
  const img = document.querySelector(".fancybox__content img");
  if (!img) return;

  const rect = img.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  const rotateX = ((y - centerY) / centerY) * 8;
  const rotateY = ((x - centerX) / centerX) * -8;

  img.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
});

document.addEventListener("mouseleave", () => {
  const img = document.querySelector(".fancybox__content img");
  if (img) img.style.transform = "rotateX(0) rotateY(0) scale(1)";
});

window.addEventListener('scroll', () => {
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 300){
    renderGallery(currentCategory, false);
  }
});
  
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Artemisa Marble - Viewer Mejorado</title>

<!-- Fancybox 4 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css"/>

<style>
body { font-family: 'Inter', sans-serif; margin:0; padding:0; background:#f8f8f8;}
header { background:#000; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;}
header nav a { color:#fff; margin:0 12px; text-decoration:none; font-weight:500; }
header nav a:hover { text-decoration:underline; }

.filters { text-align:center; margin:20px 0; }
.filters button { padding:10px 20px; margin:5px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:4px; transition:0.3s;}
.filters button.active, .filters button:hover { background:#f15a24; }usuario

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 12px;
  max-width:1200px;
  margin:0 auto;
  padding:10px;
}
  

.grid-item {
  cursor:pointer;
  position: relative; /* 👈 ESTA ES LA CLAVE */
}

.grid-item img {
  width:100%;
  border-radius:10px;
  transition: transform 0.2s ease;
}

.grid-item img:hover {
  transform: scale(1.03);
}

.grid-item button {
  opacity: 0.9;
}
.grid-item button:hover {
  opacity: 1;
  transform: scale(1.1);
}
  
.form-group {
  display:flex;
  flex-direction:column;
  margin-bottom:12px;
}

.form-group label {
  font-size:12px;
  color:#555;
  margin-bottom:4px;
}

.form-group input,
.form-group textarea {
  padding:8px;
  border-radius:6px;
  border:1px solid #ddd;
  font-size:14px;
}

.form-group textarea {
  resize:vertical;
  min-height:60px;
}

.grid-2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* 🔥 EFECTO 3D */
.fancybox__content {
  perspective: 1000px;
}

.fancybox__content img {
  transition: transform 0.1s ease;
  transform-style: preserve-3d;
  will-change: transform;
}

  /* Efecto fade para modal */
#editModal { 
  opacity: 0;
  transition: opacity 0.2s ease;
}
#editModal.show {
  opacity: 1;
}
</style>
</head>

<body>

<header>
  <div class="logo"><img src="/artemisamarbleandcabinet/logo.png" height="100"></div>
  <nav>
    <a href="https://marbleartemisa.github.io/artemisa/index.html">Home</a>
    <a href="/artemisamarbleandcabinet/aboutus/">About Us</a>
    <a href="/artemisamarbleandcabinet/kitchen/">Kitchen</a>
    <a href="/artemisamarbleandcabinet/bathroom/">Bathroom</a>
    <a href="/artemisamarbleandcabinet/cabinets/">Cabinets</a>
    <a href="/artemisamarbleandcabinet/closets">Closets</a>
    <a href="/artemisamarbleandcabinet/contacts">Contact</a>
    <a class="portal-btn" href="https://marbleartemisa.github.io/sop-site/">Portal-SOP</a>
  </nav>
</header>
<div style="text-align:center;margin:10px;">

</div>
<div class="filters"></div>

<!-- 🔎 SEARCH BAR (AQUÍ) -->
<div style="text-align:center;margin:10px;">
  <input id="searchBox" placeholder="Search images..." 
  style="padding:10px;width:250px;border-radius:6px;border:1px solid #ccc;">
</div>

<div class="grid" id="gallery"></div>

<!-- Fancybox -->
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";
let photos = [];
const PAGE_SIZE = 40;
let currentIndex = 0;
let currentCategory = 'all';
let currentUser = null;
const usuarios = [
  {usuario:"Damian Molina", clave:"Dam1975"},
  {usuario:"Alberto Molina", clave:"Alb1975"},
  {usuario:"Wendy Romanach", clave:"Wen1975"},
  {usuario:"Carlos Herrera", clave:"Art2026"},
  {usuario:"Jenny Perez", clave:"Jen1975"},
  {usuario:"Eliana Pineda", clave:"Eli1975"},
  {usuario:"Yoandry Perez", clave:"Yoa1975"},
  {usuario:"Yozusi Urdaneta", clave:"Yoz1975"}
];
  
const gallery = document.getElementById('gallery');
const filtersContainer = document.querySelector('.filters');
const searchBox = document.getElementById("searchBox");


searchBox.addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  renderSearch(value);
});
  
const priorityOrder = ["Kitchen","Bathroom","Laundry","Closets & Shelves","Outdoor","BBQ Area","Office","Powder Room","Fireplace","Wall TV","Front desk"];

function populateUsers(){
  const select = document.getElementById("loginUser");
  select.innerHTML = '<option value="">Seleccione usuario</option>';

  usuarios.forEach(u=>{
    const opt = document.createElement("option");
    opt.value = u.usuario;
    opt.textContent = u.usuario;
    select.appendChild(opt);
  });
}

function login(){
  const userName = document.getElementById("loginUser").value;
  const pass = document.getElementById("loginPass").value;

  const user = usuarios.find(u =>
    u.usuario === userName && u.clave === pass
  );

  if(user){
    currentUser = user;
    localStorage.setItem("usuario", user.usuario);

    document.getElementById("loginModal").style.display = "none";

    renderGallery(currentCategory, true);
  } else {
    document.getElementById("loginError").style.display = "block";
  }
}

function openLogin(){
  document.getElementById("loginModal").style.display = "flex";
}  

async function loadPhotos(){

  try{
    const res = await fetch(API);
    const data = await res.json();

    console.log("DATA BACKEND:", data); // 👈 DEBUG

    photos = data
      .filter(item => !item.PARENTCHILD || item.PARENTCHILD === "")
      .filter(item => item.ESTADO !== 'ELIMINADO');

    console.log("PHOTOS FILTRADAS:", photos); // 👈 DEBUG

    localStorage.setItem('photos', JSON.stringify(photos));

    createFilters();
    renderGallery();

  }catch(e){
    console.error("Error cargando datos", e);

    // fallback cache
    const cached = localStorage.getItem('photos');
    if(cached){
      photos = JSON.parse(cached);
      renderGallery();
    }
  }
}
  
function createFilters(){
  const tipos = [...new Set(photos.map(p => p.TIPO).filter(Boolean))];

  // ⚡ Render inicial
  if(filtersContainer.children.length === 0){
    filtersContainer.innerHTML = `<button class="filter-btn active" data-category="all">All</button>`;

    tipos.forEach(tipo=>{
      const btn = document.createElement('button');
      btn.className = "filter-btn";
      btn.dataset.category = tipo;
      btn.textContent = tipo;
      filtersContainer.appendChild(btn);
    });

    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery(btn.dataset.category, true);
      });
    });
  }
}

function renderGallery(category='all', reset=true){

  if(reset){
    gallery.innerHTML = '';
    currentIndex = 0;
    currentCategory = category;
  }

  const filtered = photos.filter(p => 
    (!p.ESTADO || p.ESTADO !== 'ELIMINADO') &&
    (category === 'all' || p.TIPO === category)
  );

  const slice = filtered.slice(currentIndex, currentIndex + PAGE_SIZE);

  // 🔥 ULTRA PERFORMANCE: fragment (evita reflows)
  const fragment = document.createDocumentFragment();

  slice.forEach(p => {

    const link = (p.LINK || "").trim();
    const match = link.match(/id=([^&]+)/);

    if(!match) return;

    const fileId = match[1];

    // 🔥 THUMB LIGERO (CLAVE DEL RENDIMIENTO)
    const thumb = `https://lh3.googleusercontent.com/d/${fileId}=w300`;
    const full  = `https://lh3.googleusercontent.com/d/${fileId}=w1600`;

    const item = document.createElement('div');
    item.className = 'grid-item';

    let adminButtons = '';

    if(currentUser){
      adminButtons = `
        <button style="
          position:absolute; top:8px; right:8px;
          background:#f15a24; color:white;
          border:none; border-radius:6px;
          padding:5px 7px; cursor:pointer; z-index:10;
        " onclick="event.stopPropagation(); editPhoto('${p.ID}')">✏️</button>

        <button style="
          position:absolute; top:8px; right:40px;
          background:#d11a2a; color:white;
          border:none; border-radius:6px;
          padding:5px 7px; cursor:pointer; z-index:10;
        " onclick="event.stopPropagation(); deletePhoto('${p.ID}')">🗑️</button>
      `;
    }

    item.innerHTML = `
      <a data-fancybox="gallery" href="${full}">
        <img src="${thumb}" loading="lazy"
          onerror="this.closest('.grid-item').remove()">
      </a>
      ${adminButtons}
    `;

    fragment.appendChild(item);
  });

  gallery.appendChild(fragment);

  currentIndex += PAGE_SIZE;

  Fancybox.bind("[data-fancybox='gallery']", {});
}


window.addEventListener("DOMContentLoaded", ()=>{

  populateUsers();

  const savedUser = localStorage.getItem("usuario");

  if(savedUser){
    currentUser = usuarios.find(u => u.usuario === savedUser);
  } else {
    openLogin();
  }

  loadPhotos(); // 🔥 EXACTAMENTE AQUÍ

});
  
// =========================
// Editar foto (modal)
// =========================
function editPhoto(photoID){
  const photo = photos.find(p => p.ID === photoID);
  if(!photo) return;

  const formHtml = `
    <div id="editModal" style="
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    ">
      <div style="
        background:#ffffff;
        border-radius:16px;
        width:420px;
        max-height:90vh;
        overflow-y:auto;
        padding:20px;
        box-shadow:0 10px 40px rgba(0,0,0,0.25);
        position:relative;
      ">
        <h2>Editar Imagen</h2>
        <p style="font-size:12px;color:#777;">ID: ${photo.ID}</p>

        <div class="form-group">
          <label>Stone</label>
          <input id="STONE" value="${photo.STONE||''}">
        </div>

        <div class="form-group">
          <label>Memo</label>
          <textarea id="MEMO">${photo.MEMO||''}</textarea>
        </div>

        <div class="form-group">
          <label>Colores</label>
          <input id="COLOURS" value="${photo.COLOURS||''}">
        </div>

        <div class="form-group">
          <label>Materiales</label>
          <input id="MATERIALES" value="${photo.MATERIALES||''}">
        </div>

        <div class="form-group">
          <label>Looking For</label>
          <input id="LOOKINGFOR" value="${photo.LOOKINGFOR||''}">
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>Tipo</label>
            <input id="TIPO" value="${photo.TIPO||''}">
          </div>
          <div class="form-group">
            <label>Subtipo</label>
            <input id="SUBTIPO" value="${photo.SUBTIPO||''}">
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:20px;">
          <button id="saveBtn" onclick="savePhoto('${photoID}')" style="
            flex:1;
            background:#f15a24;
            color:white;
            border:none;
            padding:10px;
            border-radius:8px;
            cursor:pointer;
          ">
            <span id="saveText">💾 Guardar</span>
            <span id="spinner" style="display:none;">⏳</span>
          </button>

          <button onclick="document.getElementById('editModal').remove()" style="
            flex:1;
            background:#eee;
            border:none;
            padding:10px;
            border-radius:8px;
            cursor:pointer;
          ">
            ❌ Cerrar
          </button>
        </div>
      </div>
    </div>
  `;

  document.body.insertAdjacentHTML('beforeend', formHtml);

  // 🔥 Aplica fade
  const modal = document.getElementById('editModal');
  setTimeout(()=>modal.classList.add('show'), 10);
}

// =========================
// Guardar foto rápido
// =========================
async function savePhoto(photoID){

  const btn = document.getElementById("saveBtn");
  const spinner = document.getElementById("spinner");
  const text = document.getElementById("saveText");

  btn.disabled = true;
  spinner.style.display = "inline";
  text.innerText = "Guardando...";

  // 1️⃣ Leer valores
  const stone = document.getElementById('STONE').value;
  const memo = document.getElementById('MEMO').value;
  const colours = document.getElementById('COLOURS').value;
  const materiales = document.getElementById('MATERIALES').value;
  const lookingfor = document.getElementById('LOOKINGFOR').value;
  const tipo = document.getElementById('TIPO').value;
  const subtipo = document.getElementById('SUBTIPO').value;

  // 2️⃣ Actualizar memoria y cache local INMEDIATAMENTE
  const index = photos.findIndex(p => p.ID === photoID);
  if(index !== -1){
    photos[index] = {
      ...photos[index],
      STONE: stone,
      MEMO: memo,
      COLOURS: colours,
      MATERIALES: materiales,
      LOOKINGFOR: lookingfor,
      TIPO: tipo,
      SUBTIPO: subtipo
    };
  }
  localStorage.setItem('photos', JSON.stringify(photos));
  
const usuario = currentUser ? currentUser.usuario : "Desconocido";
const fecha = new Date().toLocaleString();

photos[index].MEMO = (photos[index].MEMO || '') +
  `\n[EDITADO por ${usuario} - ${fecha}]`;

  // 3️⃣ Cerrar modal y refrescar galería INMEDIATAMENTE
  document.getElementById('editModal').remove();
  renderGallery(currentCategory, true);

  // 4️⃣ Guardar en servidor en segundo plano
  try {
    const params = new URLSearchParams({
      action: 'update',
      ID: photoID,
      STONE: stone,
      MEMO: memo,
      COLOURS: colours,
      MATERIALES: materiales,
      LOOKINGFOR: lookingfor,
      TIPO: tipo,
      SUBTIPO: subtipo
    });

    const res = await fetch(`${API}?${params.toString()}`);
    const resp = await res.json();

    if(!resp.success){
      alert("Error guardando en el servidor, cambios locales conservados.");
    }

  } catch(err) {
    alert("Error de conexión, cambios locales guardados.");
  }

  btn.disabled = false;
  spinner.style.display = "none";
  text.innerText = "💾 Guardar";
}
  
function deletePhoto(photoID){

  if(!currentUser) return alert("Debes iniciar sesión");

  if(!confirm("¿Seguro que deseas eliminar esta foto?")) return;

  const usuario = currentUser.usuario;
  const fecha = new Date().toLocaleString();

  const index = photos.findIndex(p => p.ID === photoID);

  if(index !== -1){
    photos[index].ESTADO = "ELIMINADO";
    photos[index].MEMO = (photos[index].MEMO || '') + 
      `\n[ELIMINADO por ${usuario} - ${fecha}]`;
  }

  localStorage.setItem('photos', JSON.stringify(photos));
  renderGallery(currentCategory, true);

  fetch(`${API}?${new URLSearchParams({
    action: 'delete',
    ID: photoID,
    ESTADO: 'ELIMINADO',
    MEMO: photos[index].MEMO
  })}`);
}

  

// 🔥 EFECTO 3D (AQUÍ VA EXACTAMENTE)
document.addEventListener("mousemove", (e) => {
  const img = document.querySelector(".fancybox__content img");
  if (!img) return;

  const rect = img.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  const rotateX = ((y - centerY) / centerY) * 8;
  const rotateY = ((x - centerX) / centerX) * -8;

  img.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
});

document.addEventListener("mouseleave", () => {
  const img = document.querySelector(".fancybox__content img");
  if (img) img.style.transform = "rotateX(0) rotateY(0) scale(1)";
});

window.addEventListener('scroll', () => {
  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 300){
    renderGallery(currentCategory, false);
  }
});
  
</script>
<!-- LOGIN MODAL -->
<div id="loginModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:9999;">
  <div style="background:#1e1e2f;padding:25px;border-radius:12px;width:300px;text-align:center;color:white;">
    <h3>Login</h3>

    <select id="loginUser" style="width:100%;padding:10px;margin-bottom:10px;border-radius:6px;"></select>

    <input type="password" id="loginPass" placeholder="Clave"
      style="width:100%;padding:10px;margin-bottom:10px;border-radius:6px;">

    <div id="loginError" style="color:red;display:none;">Datos incorrectos</div>

    <button onclick="login()" style="padding:8px 16px;background:#f15a24;color:white;border:none;border-radius:6px;">
      Entrar
    </button>
  </div>
</div>
  
</body>
</html>

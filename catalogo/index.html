<!DOCTYPE html>

<!-- Fancybox 4 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css"/>

<style>
body { font-family: 'Inter', sans-serif; margin:0; padding:0; background:#f8f8f8;}
header { background:#000; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;}
header nav a { color:#fff; margin:0 12px; text-decoration:none; font-weight:500; }
header nav a:hover { text-decoration:underline; }

.filters { text-align:center; margin:20px 0; }
.filters button { padding:10px 20px; margin:5px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:4px; transition:0.3s;}
.filters button.active, .filters button:hover { background:#f15a24; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  grid-auto-rows: 8px; /* 🔥 base masonry */
  gap: 12px;
  max-width:1200px;
  margin:0 auto;
  padding:10px;
}
  .grid-item {
  position: relative;
  overflow: hidden;
  border-radius:10px;
}

/* 🔥 EFECTO BLUR LOADING */
.grid-item img {
  width:100%;
  height:auto;
  display:block;
  filter: blur(12px);
  transform: scale(1.05);
  transition: 
    filter 0.4s ease,
    transform 0.4s ease,
    opacity 0.4s ease;
  opacity: 0;
}

/* cuando carga */
.grid-item img.loaded {
  filter: blur(0);
  transform: scale(1);
  opacity: 1;
}

.grid-item {
  cursor:pointer;
  position: relative; /* 👈 ESTA ES LA CLAVE */
}



.grid-item img:hover {
  transform: scale(1.03);
}

.grid-item button {
  opacity: 0.9;
}
.grid-item button:hover {
  opacity: 1;
  transform: scale(1.1);
}

/* =========================
   HOVER INFO OVERLAY PRO
========================= */
.grid-item .photo-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.78) 0%,
    rgba(0,0,0,0.45) 35%,
    rgba(0,0,0,0.10) 100%
  );
  color:#fff;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:18px;
  opacity:0;
  transform:translateY(12px);
  transition:all .35s ease;
  pointer-events:none;
}

  /* 👇 AQUÍ */
.photo-overlay::before{
  content:'';
  width:40px;
  height:3px;
  background:#f15a24;
  margin-bottom:10px;
  display:block;
}

.grid-item:hover .photo-overlay{
  opacity:1;
  transform:translateY(0);
}

.grid-item:hover img{
  transform:scale(1.04);
}

.photo-overlay .stone{
  font-size:15px;
  font-weight:700;
  margin-bottom:4px;
  letter-spacing:.4px;
}

.photo-overlay .proyectoid{
  font-size:13px;
  opacity:.88;
  margin-bottom:4px;
}

.photo-overlay .memo{
  font-size:12px;
  opacity:.75;
  line-height:1.4;
}

/* Mobile fallback */
@media (max-width:900px){
  .grid-item .photo-overlay{
    opacity:1;
    transform:none;
    background:linear-gradient(
      to top,
      rgba(0,0,0,0.72) 0%,
      rgba(0,0,0,0.15) 100%
    );
    padding:12px;
  }

  .photo-overlay .memo{
    display:none; /* opcional para no saturar mobile */
  }
}
  
  
.form-group {
  display:flex;
  flex-direction:column;
  margin-bottom:12px;
}

.form-group label {
  font-size:12px;
  color:#555;
  margin-bottom:4px;
}

.form-group input,
.form-group textarea {
  padding:8px;
  border-radius:6px;
  border:1px solid #ddd;
  font-size:14px;
}

.form-group textarea {
  resize:vertical;
  min-height:60px;
}

.grid-2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* 🔥 EFECTO 3D */
.fancybox__content {
  perspective: 1000px;
}

.fancybox__content img {
  transition: transform 0.1s ease;
  transform-style: preserve-3d;
  will-change: transform;
}

  /* Efecto fade para modal */
#editModal { 
  opacity: 0;
  transition: opacity 0.2s ease;
}
#editModal.show {
  opacity: 1;
}

/* HAMBURGER */
.hamburger {
  display: none;
  flex-direction: column;
  cursor: pointer;
}

.hamburger span {
  width: 25px;
  height: 3px;
  background: white;
  margin: 4px 0;
}

/* MOBILE MENU */
@media (max-width: 900px){

  header {
    flex-wrap: wrap;
  }

  .hamburger {
    display: flex;
  }

  nav {
    position: fixed;

}

@media (max-width: 900px){

  .filters {

  }

</style>

<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";
let photos = [];
const PAGE_SIZE = 40;
let currentIndex = 0;
let currentCategory = 'all';
let isLoading = false;
const gallery = document.getElementById('gallery');
const filtersContainer = document.querySelector('.filters');
const searchBox = document.getElementById("searchBox");

let isAdmin = false;

document.getElementById('adminLoginBtn').addEventListener('click', () => {
  const clave = prompt("Ingrese la clave de administrador:");
  if(clave === "Artemisa2026"){ // cambiar por tu clave real
    isAdmin = true;
    alert("Modo administrador activado");
    renderGallery(currentCategory, true); // refresca la galería para mostrar lápices
  } else {
    alert("Clave incorrecta");
  }
});

searchBox.addEventListener("input", (e) => {
  const value = e.target.value.toLowerCase();
  renderSearch(value);
});
  
const priorityOrder = ["Kitchen","Bathroom","Laundry","Closets & Shelves","Outdoor","BBQ Area","Office","Powder Room","Fireplace","Wall TV","Front desk"];


async function loadPhotos(){

  try{
    const res = await fetch(API);
    const data = await res.json();

    console.log("DATA BACKEND:", data); // 👈 DEBUG

    photos = data
      .filter(item => !item.PARENTCHILD || item.PARENTCHILD === "")
      .filter(item => item.ESTADO !== 'ELIMINADO');

    console.log("PHOTOS FILTRADAS:", photos); // 👈 DEBUG

    localStorage.setItem('photos', JSON.stringify(photos));

    createFilters();

        setTimeout(() => {
        renderGallery();
        document.getElementById("loader").style.display = "none";
        }, 50);

  }catch(e){
    console.error("Error cargando datos", e);

    // fallback cache
    const cached = localStorage.getItem('photos');
    if(cached){
      photos = JSON.parse(cached);
      renderGallery();
    }
  }
}
  
function createFilters(){
  const tipos = [...new Set(photos.map(p => p.TIPO).filter(Boolean))];

  // ⚡ Render inicial
  if(filtersContainer.children.length === 0){
    filtersContainer.innerHTML = `<button class="filter-btn active" data-category="all">All</button>`;

    tipos.forEach(tipo=>{
      const btn = document.createElement('button');
      btn.className = "filter-btn";
      btn.dataset.category = tipo;
      btn.textContent = tipo;
      filtersContainer.appendChild(btn);
    });

    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery(btn.dataset.category, true);
      });
    });
  }
}


function renderGallery(category='all', reset=true){

  if(isLoading) return;
  isLoading = true;

  if(reset){
    gallery.innerHTML = '';
    currentIndex = 0;
    currentCategory = category;
  }

  const filtered = photos.filter(p => 
    (!p.ESTADO || p.ESTADO !== 'ELIMINADO') &&
    (category === 'all' || p.TIPO === category)
  );

  const slice = filtered.slice(currentIndex, currentIndex + PAGE_SIZE);

  if(slice.length === 0){
    isLoading = false;
    return;
  }

  const fragment = document.createDocumentFragment();

  slice.forEach(p => {

    const link = (p.LINK || "").trim();
    const match = link.match(/id=([^&]+)/);
    if(!match) return;

    const fileId = match[1];

    const thumb = `https://lh3.googleusercontent.com/d/${fileId}=w800`;
    const full  = `https://lh3.googleusercontent.com/d/${fileId}=s0`;
    
    const item = document.createElement('div');
    item.className = 'grid-item';

    let adminButtons = '';

    if(isAdmin){
      adminButtons = `
        <button style="
          position:absolute; top:8px; right:8px;
          background:#f15a24; color:white;
          border:none; border-radius:6px;
          padding:5px 7px; cursor:pointer; z-index:10;
        " onclick="event.stopPropagation(); editPhoto('${p.ID}')">✏️</button>

        <button style="
          position:absolute; top:8px; right:40px;
          background:#d11a2a; color:white;
          border:none; border-radius:6px;
          padding:5px 7px; cursor:pointer; z-index:10;
        " onclick="event.stopPropagation(); deletePhoto('${p.ID}')">🗑️</button>
      `;
    }

    item.innerHTML = `
  <a data-fancybox="gallery" href="${full}">
    <img src="${thumb}" loading="lazy"
      onerror="this.closest('.grid-item').remove()">

    <div class="photo-overlay">
      <div class="stone">${p.STONE || 'Unknown Stone'}</div>
      <div class="proyectoid">${p.PROYECTOID || ''}</div>
      <div class="memo">${p.MEMO || ''}</div>
    </div>
  </a>

  ${adminButtons}
`;


    fragment.appendChild(item);

    // 🔥 Pinterest resize
    resizeGridItem(item);
  });

  gallery.appendChild(fragment);

  currentIndex += PAGE_SIZE;

  Fancybox.bind("[data-fancybox='gallery']", {
  animated: true,
  dragToClose: false,

  closeButton: "top",   // 👈 AQUÍ
  showClass: "fancybox-zoomIn",  // 👈 AQUÍ
  hideClass: "fancybox-zoomOut",  // 👈 AQUÍ

  Images: {
    zoom: true,
    wheel: "zoom",
    click: "toggleZoom",
    Panzoom: {
      maxScale: 6
    }
  },

  Toolbar: {
    display: [
      "zoom",
      "fullscreen",
      "close"
    ]
  }
});

  isLoading = false;
}


  function renderSearch(query){

  // 🔥 reset total
  gallery.innerHTML = '';
  currentIndex = 0;

  if(!query){
    renderGallery(currentCategory, true);
    return;
  }

  const filtered = photos.filter(p => {

    const text = `
      ${p.STONE || ''}
      ${p.PROYECTOID || ''}
      ${p.MEMO || ''}
      ${p.COLOURS || ''}
      ${p.MATERIALES || ''}
      ${p.LOOKINGFOR || ''}
      ${p.TIPO || ''}
      ${p.SUBTIPO || ''}
    `.toLowerCase();

    return text.includes(query);
  });

  // 🔥 render directo (sin paginación para búsqueda)
  const fragment = document.createDocumentFragment();

  filtered.forEach(p => {

    const link = (p.LINK || "").trim();
    const match = link.match(/id=([^&]+)/);
    if(!match) return;

    const fileId = match[1];

    const thumb = `https://lh3.googleusercontent.com/d/${fileId}=w800`;
    const full  = `https://lh3.googleusercontent.com/d/${fileId}=s0`;

    const item = document.createElement('div');
    item.className = 'grid-item';

    let adminButtons = '';

    if(isAdmin){
      adminButtons = `
        <button style="
          position:absolute; top:8px; right:8px;
          background:#f15a24; color:white;
          border:none; border-radius:6px;
          padding:5px 7px; cursor:pointer; z-index:10;
        " onclick="event.stopPropagation(); editPhoto('${p.ID}')">✏️</button>

        <button style="
          position:absolute; top:8px; right:40px;
          background:#d11a2a; color:white;
          border:none; border-radius:6px;
          padding:5px 7px; cursor:pointer; z-index:10;
        " onclick="event.stopPropagation(); deletePhoto('${p.ID}')">🗑️</button>
      `;
    }

    item.innerHTML = `
  <a data-fancybox="gallery" href="${full}">
    <img src="${thumb}" loading="lazy"
      onerror="this.closest('.grid-item').remove()">

    <div class="photo-overlay">
      <div class="stone">${p.STONE || 'Unknown Stone'}</div>
      <div class="proyectoid">${p.PROYECTOID || ''}</div>
      <div class="memo">${p.MEMO || ''}</div>
    </div>
  </a>

  ${adminButtons}
`;


    fragment.appendChild(item);
    resizeGridItem(item);
  });

  gallery.appendChild(fragment);

  Fancybox.bind("[data-fancybox='gallery']", {
    animated: true
  });
}

      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);

      z-index:9999;
    ">
      <div style="
        background:#ffffff;
        border-radius:16px;
        width:420px;
        max-height:90vh;
        overflow-y:auto;
        padding:20px;
        box-shadow:0 10px 40px rgba(0,0,0,0.25);
        position:relative;

         <div class="grid-2">

        <div class="form-group">

          <label>Materiales</label>
          <input id="MATERIALES" value="${photo.MATERIALES||''}">

        <div class="form-group">
          <label>Looking For</label>

        <div class="grid-2">

        <div style="display:flex;gap:10px;margin-top:20px;">

// =========================
// Guardar foto rápido
// =========================

async function savePhoto(photoID){

  const btn = document.getElementById("saveBtn");
  const spinner = document.getElementById("spinner");
  const text = document.getElementById("saveText");

  btn.disabled = true;
  spinner.style.display = "inline";
  text.innerText = "Guardando...";

  // 1️⃣ Leer valores
  const stone = document.getElementById('STONE').value;
  const proyectoid = document.getElementById('PROYECTOID').value;
  const memo = document.getElementById('MEMO').value;
  const colours = document.getElementById('COLOURS').value;
  const materiales = document.getElementById('MATERIALES').value;
  const lookingfor = document.getElementById('LOOKINGFOR').value;
  const tipo = document.getElementById('TIPO').value;
  const subtipo = document.getElementById('SUBTIPO').value;

  // 2️⃣ Actualizar memoria y cache local INMEDIATAMENTE
  const index = photos.findIndex(p => p.ID === photoID);
  if(index !== -1){
    photos[index] = {
      ...photos[index],
      STONE: stone,
      PROYECTOID:proyectoid,
      MEMO: memo,
      COLOURS: colours,
      MATERIALES: materiales,
      LOOKINGFOR: lookingfor,
      TIPO: tipo,
      SUBTIPO: subtipo
    };
  }
  localStorage.setItem('photos', JSON.stringify(photos));

  // 3️⃣ Cerrar modal y refrescar galería INMEDIATAMENTE
  document.getElementById('editModal').remove();
  renderGallery(currentCategory, true);

  // 4️⃣ Guardar en servidor en segundo plano
  try {
    const params = new URLSearchParams({
      action: 'update',
      ID: photoID,
      STONE: stone,
      PROYECTOID:proyectoid,
      MEMO: memo,
      COLOURS: colours,
      MATERIALES: materiales,
      LOOKINGFOR: lookingfor,
      TIPO: tipo,
      SUBTIPO: subtipo
    });

    const res = await fetch(`${API}?${params.toString()}`);
    const resp = await res.json();

    if(!resp.success){
      alert("Error guardando en el servidor, cambios locales conservados.");
    }

  } catch(err) {
    alert("Error de conexión, cambios locales guardados.");
  }

  btn.disabled = false;
  spinner.style.display = "none";
  text.innerText = "💾 Guardar";
}
  

  
function deletePhoto(photoID){

  if(!confirm("¿Seguro que deseas eliminar esta foto?")) return;

  const usuario = "admin"; // puedes luego hacerlo dinámico
  const fecha = new Date().toLocaleString();

  const index = photos.findIndex(p => p.ID === photoID);

  if(index !== -1){
    photos[index].ESTADO = "ELIMINADO";
    photos[index].MEMO = (photos[index].MEMO || '') + 
      `\n[ELIMINADO por ${usuario} - ${fecha}]`;
  }

  // 🔹 Actualizar cache local inmediato
  localStorage.setItem('photos', JSON.stringify(photos));

  // 🔹 Refrescar UI inmediato
  renderGallery(currentCategory, true);

  // 🔹 Guardar en backend
  fetch(`${API}?${new URLSearchParams({
    action: 'delete',
    ID: photoID,
    ESTADO: 'ELIMINADO',
    MEMO: photos[index].MEMO
  })}`)
  .then(r=>r.json())
  .then(resp=>{
    if(!resp.success){
      alert("Error en servidor, pero eliminado localmente");
    }
  })
  .catch(()=>{
    alert("Sin conexión, eliminado localmente");
  });
}

function resizeGridItem(item){
  const grid = document.querySelector('.grid');
  const rowHeight = parseInt(getComputedStyle(grid).getPropertyValue('grid-auto-rows'));
  const rowGap = parseInt(getComputedStyle(grid).getPropertyValue('gap'));

  const img = item.querySelector('img');

  if(!img) return;

  img.onload = () => {
    const rowSpan = Math.ceil((img.getBoundingClientRect().height + rowGap) / (rowHeight + rowGap));
    item.style.gridRowEnd = "span " + rowSpan;

    // 🔥 activar animación
    img.classList.add("loaded");
  };
}

function toggleMenu(){
  document.getElementById("mobileMenu").classList.toggle("active");
}

// 🔥 EFECTO 3D (AQUÍ VA EXACTAMENTE)
document.addEventListener("mousemove", (e) => {
  const img = document.querySelector(".fancybox__content img");
  if (!img) return;

  const rect = img.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  const rotateX = ((y - centerY) / centerY) * 8;
  const rotateY = ((x - centerX) / centerX) * -8;

  img.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
});

document.addEventListener("mouseleave", () => {
  const img = document.querySelector(".fancybox__content img");
  if (img) img.style.transform = "rotateX(0) rotateY(0) scale(1)";
});

let isLoadingMore = false;


  window.addEventListener('scroll', () => {

  if(isLoading) return;

  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500){
    renderGallery(currentCategory, false);
  }

});
  
  
// 👇 AQUÍ MISMO PEGAS ESTO
window.addEventListener("DOMContentLoaded", () => {
  loadPhotos();
});

  
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Artemisa Marble - Viewer Mejorado</title>

<!-- Fancybox 4 -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css"/>

<style>
body { font-family: 'Inter', sans-serif; margin:0; padding:0; background:#f8f8f8;}
header { background:#000; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;}
header nav a { color:#fff; margin:0 12px; text-decoration:none; font-weight:500; }
header nav a:hover { text-decoration:underline; }

.filters { text-align:center; margin:20px 0; }
.filters button { padding:10px 20px; margin:5px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:4px; transition:0.3s;}
.filters button.active, .filters button:hover { background:#f15a24; }

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  grid-auto-rows: 8px; /* 🔥 base masonry */
  gap: 12px;
  max-width:1200px;
  margin:0 auto;
  padding:10px;
}
  .grid-item {
  position: relative;
  overflow: hidden;
  border-radius:10px;
}

/* 🔥 EFECTO BLUR LOADING */
.grid-item img {
  width:100%;
  height:auto;
  display:block;
  filter: blur(12px);
  transform: scale(1.05);
  transition: 
    filter 0.4s ease,
    transform 0.4s ease,
    opacity 0.4s ease;
  opacity: 0;
}

/* cuando carga */
.grid-item img.loaded {
  filter: blur(0);
  transform: scale(1);
  opacity: 1;
}

.grid-item {
  cursor:pointer;
  position: relative; /* 👈 ESTA ES LA CLAVE */
}



.grid-item img:hover {
  transform: scale(1.03);
}

.grid-item button {
  opacity: 0.9;
}
.grid-item button:hover {
  opacity: 1;
  transform: scale(1.1);
}
  
.form-group {
  display:flex;
  flex-direction:column;
  margin-bottom:12px;
}

.form-group label {
  font-size:12px;
  color:#555;
  margin-bottom:4px;
}

.form-group input,
.form-group textarea {
  padding:8px;
  border-radius:6px;
  border:1px solid #ddd;
  font-size:14px;
}

.form-group textarea {
  resize:vertical;
  min-height:60px;
}

.grid-2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* 🔥 EFECTO 3D */
.fancybox__content {
  perspective: 1000px;
}

.fancybox__content img {
  transition: transform 0.1s ease;
  transform-style: preserve-3d;
  will-change: transform;
}

  /* Efecto fade para modal */
#editModal { 
  opacity: 0;
  transition: opacity 0.2s ease;
}
#editModal.show {
  opacity: 1;
}

@keyframes spin {
  0% { transform: rotate(0deg);}
  100% { transform: rotate(360deg);}
}
  
</style>
</head>

<body>

<header>
  <div class="logo"><img src="/artemisamarbleandcabinet/logo.png" height="100"></div>
  <nav>
    <a href="https://marbleartemisa.github.io/artemisa/index.html">Home</a>
    <a href="/artemisamarbleandcabinet/aboutus/">About Us</a>
    <a href="/artemisamarbleandcabinet/kitchen/">Kitchen</a>
    <a href="/artemisamarbleandcabinet/bathroom/">Bathroom</a>
    <a href="/artemisamarbleandcabinet/cabinets/">Cabinets</a>
    <a href="/artemisamarbleandcabinet/closets">Closets</a>
    <a href="/artemisamarbleandcabinet/contacts">Contact</a>
    <a class="portal-btn" href="https://marbleartemisa.github.io/sop-site/">Portal-SOP</a>
  </nav>
</header>
<div style="text-align:center;margin:10px;">
  <button id="adminLoginBtn" style="padding:8px 16px;background:#f15a24;color:white;border:none;border-radius:5px;cursor:pointer;">
    Ingresar clave Admin
  </button>
</div>
<div class="filters"></div>

<!-- 🔎 SEARCH BAR (AQUÍ) -->
<div style="text-align:center;margin:10px;">
  <input id="searchBox" placeholder="Search images..." 
  style="padding:10px;width:250px;border-radius:6px;border:1px solid #ccc;">
</div>

<div id="loader" style="text-align:center; margin:40px;">
  <div style="
    width:40px;
    height:40px;
    border:4px solid #ccc;
    border-top:4px solid #f15a24;
    border-radius:50%;
    margin:auto;
    animation: spin 1s linear infinite;
  "></div>
  <p style="margin-top:10px;color:#666;">Cargando galería...</p>
</div>
  
<div class="grid" id="gallery"></div>

<!-- Fancybox -->
<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbyy4H8o3wD8oXRdFMAv5oZHuWrbJ4gY_jNoR9MSBKLqQZbIuBiXJH8Dq4S-jAz6ZlZo/exec";
let allLoaded = false;
let photos = [];
let allPhotos = [];
let searchIndexReady = false;
const PAGE_SIZE = 40;
let currentIndex = 0;
let currentCategory = 'all';
let isLoading = false;
const gallery = document.getElementById('gallery');
const filtersContainer = document.querySelector('.filters');
const searchBox = document.getElementById("searchBox");
let isSearching = false;

let isAdmin = false;

document.getElementById('adminLoginBtn').addEventListener('click', () => {
  const clave = prompt("Ingrese la clave de administrador:");
  if(clave === "Artemisa2026"){ // cambiar por tu clave real
    isAdmin = true;
    alert("Modo administrador activado");
    renderGallery(currentCategory, true); // refresca la galería para mostrar lápices
  } else {
    alert("Clave incorrecta");
  }
});


let searchTimeout;

searchBox.addEventListener("input", (e) => {
  clearTimeout(searchTimeout);

  searchTimeout = setTimeout(async () => {

    const value = e.target.value.toLowerCase().trim();

    // 🔥 si está vacío, reset limpio
    if(!value){
      isSearching = false;
      renderGallery(currentCategory, true);
      return;
    }

    isSearching = true;

    // 🔥 SOLO cargar todo una vez
        if (!searchIndexReady) {
          document.getElementById("loader").style.display = "block";
        
          await loadAllPhotos();
        
          searchIndexReady = true;
        
          document.getElementById("loader").style.display = "none";
        }

    renderSearch(value);

  }, 300);
});
  
const priorityOrder = ["Kitchen","Bathroom","Laundry","Closets & Shelves","Outdoor","BBQ Area","Office","Powder Room","Fireplace","Wall TV","Front desk"];


async function loadPhotos(offset = 0){

  try{

    const res = await fetch(`${API}?offset=${offset}&limit=${PAGE_SIZE}`);

    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch(e){
      console.log("❌ RESPUESTA NO JSON:", text);
      return;
    }

    const processed = data.map(p => ({
      ...p,
      _searchText: [
        p.STONE || '',
        p.PROYECTOID || '',
        p.MEMO || '',
        p.COLOURS || '',
        p.MATERIALES || '',
        p.LOOKINGFOR || '',
        p.TIPO || '',
        p.SUBTIPO || ''
      ].join(" ").toLowerCase()
    }));

    // 🔥 1. ACTUALIZAS MEMORIA
    photos = photos.concat(processed);
    localStorage.setItem('photos', JSON.stringify(photos));
    
    // 🔥 2. GUARDAS CACHE (AQUÍ VA EXACTAMENTE)
    localStorage.setItem('photos', JSON.stringify(photos));

    // 🔥 3. LUEGO UI
    createFilters();
    renderGallery(currentCategory, false);

    document.getElementById("loader").style.display = "none";

  } catch(err){
    console.error("❌ ERROR API:", err);
  }
}

  
async function loadAllPhotos() {
  let offset = 0;

  allPhotos = [];

  while (true) {
    const res = await fetch(`${API}?offset=${offset}&limit=${PAGE_SIZE}`);
    const text = await res.text();

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      break;
    }

    if (!data || data.length === 0) break;

    const processed = data.map(p => ({
      ...p,
      _searchText: [
        p.STONE || '',
        p.PROYECTOID || '',
        p.MEMO || '',
        p.COLOURS || '',
        p.MATERIALES || '',
        p.LOOKINGFOR || '',
        p.TIPO || '',
        p.SUBTIPO || ''
      ].join(" ").toLowerCase()
    }));

    allPhotos = allPhotos.concat(processed);
    offset += PAGE_SIZE;
  }

  console.log("✅ SEARCH INDEX READY:", allPhotos.length);
}
  
function createFilters(){
  const tipos = [...new Set(photos.map(p => p.TIPO).filter(Boolean))];

  // ⚡ Render inicial
  if(filtersContainer.children.length === 0){
    filtersContainer.innerHTML = `<button class="filter-btn active" data-category="all">All</button>`;

    tipos.forEach(tipo=>{
      const btn = document.createElement('button');
      btn.className = "filter-btn";
      btn.dataset.category = tipo;
      btn.textContent = tipo;
      filtersContainer.appendChild(btn);
    });

    document.querySelectorAll('.filter-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        renderGallery(btn.dataset.category, true);
      });
    });
  }
}


function renderGallery(category='all', reset=true){

  if(isLoading) return;
  isLoading = true;

  if(reset){
    gallery.innerHTML = '';
    currentIndex = 0;
    currentCategory = category;
  }

  const filtered = photos.filter(p => 
    (!p.ESTADO || p.ESTADO !== 'ELIMINADO') &&
    (category === 'all' || p.TIPO === category)
  );

  const slice = filtered.slice(currentIndex, currentIndex + PAGE_SIZE);

  if(slice.length === 0){
    isLoading = false;
    return;
  }

  const fragment = document.createDocumentFragment();

  slice.forEach(p => {

    const link = (p.LINK || "").trim();
    const match = link.match(/id=([^&]+)/);
    if(!match) return;

    const fileId = match[1];

    const thumb = `https://lh3.googleusercontent.com/d/${fileId}=w300`;
    const full  = `https://lh3.googleusercontent.com/d/${fileId}=s0`;
    
    const item = document.createElement('div');
    item.className = 'grid-item';

    let adminButtons = '';

    if(isAdmin){
      adminButtons = `
        <button style="
          position:absolute; top:8px; right:8px;
          background:#f15a24; color:white;
          border:none; border-radius:6px;
          padding:5px 7px; cursor:pointer; z-index:10;
        " onclick="event.stopPropagation(); editPhoto('${p.ID}')">✏️</button>

        <button style="
          position:absolute; top:8px; right:40px;
          background:#d11a2a; color:white;
          border:none; border-radius:6px;
          padding:5px 7px; cursor:pointer; z-index:10;
        " onclick="event.stopPropagation(); deletePhoto('${p.ID}')">🗑️</button>
      `;
    }

    item.innerHTML = `
      <a data-fancybox="gallery" href="${full}">
        <img src="${thumb}" 
              loading="lazy"
              decoding="async"
              fetchpriority="low"
              onerror="this.closest('.grid-item').remove()">
      </a>
      ${adminButtons}
    `;

    fragment.appendChild(item);

    resizeGridItem(item);
  });

  gallery.appendChild(fragment);

  currentIndex += PAGE_SIZE;

  // ✅ Fancybox SOLO UNA VEZ
  if(!window.fancyboxInitialized){
    Fancybox.bind("[data-fancybox='gallery']", {
      animated: true,
      dragToClose: false,
      closeButton: "top",
      showClass: "fancybox-zoomIn",
      hideClass: "fancybox-zoomOut",
      Images: {
        zoom: true,
        wheel: "zoom",
        click: "toggleZoom",
        Panzoom: { maxScale: 6 }
      },
      Toolbar: {
        display: ["zoom","fullscreen","close"]
      }
    });

    window.fancyboxInitialized = true;
  }

  isLoading = false;
}

function renderSearch(query){

  if(!photos || photos.length === 0){
    console.warn("⏳ Esperando carga de fotos...");
    return;
  }

  gallery.innerHTML = "";
  currentIndex = 0;

  if(!query || query.trim() === ""){
    isSearching = false;
    renderGallery(currentCategory, true);
    return;
  }

  isSearching = true;

  const words = query.toLowerCase().split(" ").filter(w => w);

  const filtered = allPhotos.filter(p => {

    if (p.ESTADO === 'ELIMINADO') return false;

    // 🔥 RESPETA FILTRO DE CATEGORÍA
    if(currentCategory !== 'all' && p.TIPO !== currentCategory) return false;

    // 🔥 MÁS FLEXIBLE (ANTES ERA every)
    return words.every(word =>
      (p._searchText || "").includes(word)
    );

  });

  if(filtered.length === 0){
    gallery.innerHTML = "<p style='text-align:center;'>No results</p>";
    return;
  }

  const fragment = document.createDocumentFragment();

  // 🔥 LIMITA RESULTADOS PARA PERFORMANCE
  const limited = filtered.slice(0, 80);

  limited.forEach(p => {

    const link = (p.LINK || "").trim();
    const match = link.match(/id=([^&]+)/);
    if(!match) return;

    const fileId = match[1];

    const thumb = `https://lh3.googleusercontent.com/d/${fileId}=w400`;
    const full  = `https://lh3.googleusercontent.com/d/${fileId}=s0`;

    const item = document.createElement('div');
    item.className = 'grid-item';

    item.innerHTML = `
      <a data-fancybox="gallery" href="${full}">
        <img 
          src="${thumb}" 
          loading="lazy"
          decoding="async"
          fetchpriority="low"
          onerror="this.closest('.grid-item').remove()"
        >
      </a>
      ${isAdmin ? `
        <button style="position:absolute; top:8px; right:8px; background:#f15a24; color:white; border:none; border-radius:6px; padding:5px; cursor:pointer;" onclick="event.stopPropagation(); editPhoto('${p.ID}')">✏️</button>
      ` : ''}
    `;

    fragment.appendChild(item);

    resizeGridItem(item);
  });

  gallery.appendChild(fragment);
}
  
// =========================
// Editar foto (modal)
// =========================
function editPhoto(photoID){
  const photo = photos.find(p => p.ID === photoID);
  if(!photo) return;

  const formHtml = `
    <div id="editModal" style="
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    ">
      <div style="
        background:#ffffff;
        border-radius:16px;
        width:420px;
        max-height:90vh;
        overflow-y:auto;
        padding:20px;
        box-shadow:0 10px 40px rgba(0,0,0,0.25);
        position:relative;
      ">
        <h2>Editar Imagen</h2>
        <p style="font-size:12px;color:#777;">ID: ${photo.ID}</p>

       <div class="grid-2">
          <div class="form-group">
            <label>Stone</label>
            <input id="STONE" value="${photo.STONE||''}">
          </div>
          <div class="form-group">
            <label>Proyecto</label>
            <input id="PROYECTOID" value="${photo.PROYECTOID||''}">
          </div>
        </div>

        <div class="form-group">
          <label>Memo</label>
          <textarea id="MEMO">${photo.MEMO||''}</textarea>
        </div>

        <div class="form-group">
          <label>Colores</label>
          <input id="COLOURS" value="${photo.COLOURS||''}">
        </div>

        <div class="form-group">
          <label>Materiales</label>
          <input id="MATERIALES" value="${photo.MATERIALES||''}">
        </div>

        <div class="form-group">
          <label>Looking For</label>
          <input id="LOOKINGFOR" value="${photo.LOOKINGFOR||''}">
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>Tipo</label>
            <input id="TIPO" value="${photo.TIPO||''}">
          </div>
          <div class="form-group">
            <label>Subtipo</label>
            <input id="SUBTIPO" value="${photo.SUBTIPO||''}">
          </div>
        </div>

        <div style="display:flex;gap:10px;margin-top:20px;">
          <button id="saveBtn" onclick="savePhoto('${photoID}')" style="
            flex:1;
            background:#f15a24;
            color:white;
            border:none;
            padding:10px;
            border-radius:8px;
            cursor:pointer;
          ">
            <span id="saveText">💾 Guardar</span>
            <span id="spinner" style="display:none;">⏳</span>
          </button>

          <button onclick="document.getElementById('editModal').remove()" style="
            flex:1;
            background:#eee;
            border:none;
            padding:10px;
            border-radius:8px;
            cursor:pointer;
          ">
            ❌ Cerrar
          </button>
        </div>
      </div>
    </div>
  `;

  document.body.insertAdjacentHTML('beforeend', formHtml);

  // 🔥 Aplica fade
  const modal = document.getElementById('editModal');
  setTimeout(()=>modal.classList.add('show'), 10);
}

// =========================
// Guardar foto rápido
// =========================
async function savePhoto(photoID){

  const btn = document.getElementById("saveBtn");
  const spinner = document.getElementById("spinner");
  const text = document.getElementById("saveText");

  btn.disabled = true;
  spinner.style.display = "inline";
  text.innerText = "Guardando...";

  // 1️⃣ Leer valores
  const stone = document.getElementById('STONE').value;
  const proyectoid = document.getElementById('PROYECTOID').value;
  const memo = document.getElementById('MEMO').value;
  const colours = document.getElementById('COLOURS').value;
  const materiales = document.getElementById('MATERIALES').value;
  const lookingfor = document.getElementById('LOOKINGFOR').value;
  const tipo = document.getElementById('TIPO').value;
  const subtipo = document.getElementById('SUBTIPO').value;

  // 2️⃣ Actualizar memoria y cache local INMEDIATAMENTE
  const index = photos.findIndex(p => p.ID === photoID);
  if(index !== -1){
    photos[index] = {
      ...photos[index],
      STONE: stone,
      PROYECTOID:proyectoid,
      MEMO: memo,
      COLOURS: colours,
      MATERIALES: materiales,
      LOOKINGFOR: lookingfor,
      TIPO: tipo,
      SUBTIPO: subtipo
    };
  }
  localStorage.setItem('photos', JSON.stringify(photos));

  // 3️⃣ Cerrar modal y refrescar galería INMEDIATAMENTE
  document.getElementById('editModal').remove();
  renderGallery(currentCategory, true);

  // 4️⃣ Guardar en servidor en segundo plano
  try {
    const params = new URLSearchParams({
      action: 'update',
      ID: photoID,
      STONE: stone,
      PROYECTOID:proyectoid,
      MEMO: memo,
      COLOURS: colours,
      MATERIALES: materiales,
      LOOKINGFOR: lookingfor,
      TIPO: tipo,
      SUBTIPO: subtipo
    });

    const res = await fetch(`${API}?${params.toString()}`);
    const resp = await res.json();

    if(!resp.success){
      alert("Error guardando en el servidor, cambios locales conservados.");
    }

  } catch(err) {
    alert("Error de conexión, cambios locales guardados.");
  }

  btn.disabled = false;
  spinner.style.display = "none";
  text.innerText = "💾 Guardar";
}
  
function deletePhoto(photoID){

  if(!confirm("¿Seguro que deseas eliminar esta foto?")) return;

  const usuario = "admin"; // puedes luego hacerlo dinámico
  const fecha = new Date().toLocaleString();

  const index = photos.findIndex(p => p.ID === photoID);

  if(index !== -1){
    photos[index].ESTADO = "ELIMINADO";
    photos[index].MEMO = (photos[index].MEMO || '') + 
      `\n[ELIMINADO por ${usuario} - ${fecha}]`;
  }

  // 🔹 Actualizar cache local inmediato
  localStorage.setItem('photos', JSON.stringify(photos));

  // 🔹 Refrescar UI inmediato
  renderGallery(currentCategory, true);

  // 🔹 Guardar en backend
  fetch(`${API}?${new URLSearchParams({
    action: 'delete',
    ID: photoID,
    ESTADO: 'ELIMINADO',
    MEMO: photos[index].MEMO
  })}`)
  .then(r=>r.json())
  .then(resp=>{
    if(!resp.success){
      alert("Error en servidor, pero eliminado localmente");
    }
  })
  .catch(()=>{
    alert("Sin conexión, eliminado localmente");
  });
}

function resizeGridItem(item){
  const grid = document.querySelector('.grid');
  const rowHeight = parseInt(getComputedStyle(grid).getPropertyValue('grid-auto-rows'));
  const rowGap = parseInt(getComputedStyle(grid).getPropertyValue('gap'));

  const img = item.querySelector('img');

  if(!img) return;

  img.onload = () => {
    const rowSpan = Math.ceil((img.getBoundingClientRect().height + rowGap) / (rowHeight + rowGap));
    item.style.gridRowEnd = "span " + rowSpan;

    // 🔥 activar animación
    img.classList.add("loaded");
  };
}
  

// 🔥 EFECTO 3D (AQUÍ VA EXACTAMENTE)
document.addEventListener("mousemove", (e) => {
  const img = document.querySelector(".fancybox__content img");
  if (!img) return;

  const rect = img.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  const centerX = rect.width / 2;
  const centerY = rect.height / 2;

  const rotateX = ((y - centerY) / centerY) * 8;
  const rotateY = ((x - centerX) / centerX) * -8;

  img.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.05)`;
});

document.addEventListener("mouseleave", () => {
  const img = document.querySelector(".fancybox__content img");
  if (img) img.style.transform = "rotateX(0) rotateY(0) scale(1)";
});

let isLoadingMore = false;

window.addEventListener('scroll', async () => {

  if(isLoading || isSearching || allLoaded) return;

  if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 500){
    isLoading = true;
    await loadPhotos(photos.length);
    isLoading = false;
  }

});
  
  window.addEventListener("DOMContentLoaded", () => {
  
    const cache = localStorage.getItem('photos');
  
    if(cache){
      photos = JSON.parse(cache);
      searchIndexReady = false;
      createFilters();
      renderGallery('all', true);
      document.getElementById("loader").style.display = "none";
    } else {
      loadPhotos(0);
    }
  
  });
  
</script>

</body>
</html>

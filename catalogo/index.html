<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";

let allPhotos = [];
let parentPhotos = [];
let currentAlbum = [];
let currentIndex = 0;

const gallery = document.getElementById('gallery');
const filtersContainer = document.querySelector('.filters');
const viewerStage = document.getElementById('viewerStage');
const viewerEmpty = document.getElementById('viewerEmpty');
const mainPhoto = document.getElementById('mainPhoto');
const thumbStrip = document.getElementById('thumbStrip');

const priorityOrder = [
  "Kitchen","Bathroom","Laundry","Closet & Shelves",
  "Outdoor","BBQ Area","Office","Powder Room",
  "Fireplace","Wall TV","Front desk","Cabinets","Closets"
];

async function loadPhotos() {
  const res = await fetch(API);
  const data = await res.json();

  allPhotos = data || [];
  parentPhotos = allPhotos.filter(item => !item.PARENTCHILD);

  createFilters();
  renderGallery();
}

function extractDriveId(url = "") {
  if (!url) return null;

  const fromQuery = url.match(/[?&]id=([A-Za-z0-9_-]{20,})/);
  if (fromQuery) return fromQuery[1];

  const fromPath = url.match(/\/d\/([A-Za-z0-9_-]{20,})/);
  if (fromPath) return fromPath[1];

  return null;
}

function getImageSrc(photo) {
  // 1) Si tienes la imagen servida desde tu propio sitio, úsala primero
  if (photo.DRIVE) {
    return `/artemisamarbleandcabinet/${photo.DRIVE}`;
  }

  // 2) Fallback a Google Drive solo si hay fileId válido
  const fileId = extractDriveId(photo.LINK);
  if (fileId) {
    return `https://drive.google.com/thumbnail?id=${fileId}&sz=w2000`;
  }

  return null;
}

function getAlbum(parent) {
  const children = allPhotos.filter(item => item.PARENTCHILD === parent.ID);
  return [parent, ...children];
}

function createFilters() {
  const tipos = [...new Set(parentPhotos.map(p => p.TIPO).filter(Boolean))];

  tipos.sort((a, b) => {
    const ia = priorityOrder.indexOf(a);
    const ib = priorityOrder.indexOf(b);
    if (ia === -1 && ib === -1) return a.localeCompare(b);
    if (ia === -1) return 1;
    if (ib === -1) return -1;
    return ia - ib;
  });

  filtersContainer.innerHTML = `<button class="filter-btn active" data-category="all">All</button>`;

  tipos.forEach(tipo => {
    const btn = document.createElement('button');
    btn.className = "filter-btn";
    btn.dataset.category = tipo;
    btn.textContent = tipo;
    filtersContainer.appendChild(btn);
  });

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery(btn.dataset.category);
    });
  });
}

function renderGallery(category = 'all') {
  gallery.innerHTML = '';

  const filtered = parentPhotos.filter(p => category === 'all' || p.TIPO === category);

  let firstValid = null;

  filtered.forEach(photo => {
    const src = getImageSrc(photo);
    if (!src) return;

    if (!firstValid) firstValid = photo;

    const item = document.createElement('div');
    item.className = 'grid-item';
    item.innerHTML = `<img src="${src}" alt="${photo.TIPO || 'Foto'}" loading="lazy">`;

    item.addEventListener('click', () => {
      openViewer(photo);
      viewerStage.scrollIntoView({ behavior: 'smooth', block: 'center' });
    });

    gallery.appendChild(item);
  });

  if (firstValid) {
    openViewer(firstValid);
  } else {
    mainPhoto.style.display = 'none';
    viewerEmpty.style.display = 'block';
    viewerEmpty.textContent = 'No hay fotos disponibles en esta categoría';
    thumbStrip.innerHTML = '';
  }
}

function openViewer(parent) {
  currentAlbum = getAlbum(parent)
    .map(p => ({ ...p, src: getImageSrc(p) }))
    .filter(p => p.src);

  renderThumbStrip();
  setMainPhoto(0);
}

function renderThumbStrip() {
  thumbStrip.innerHTML = '';

  currentAlbum.forEach((photo, index) => {
    const img = document.createElement('img');
    img.src = photo.src;
    img.alt = photo.SUBTIPO || photo.TIPO || `Foto ${index + 1}`;
    if (index === currentIndex) img.classList.add('active');

    img.addEventListener('click', () => {
      setMainPhoto(index);
    });

    thumbStrip.appendChild(img);
  });
}

function setMainPhoto(index) {
  if (!currentAlbum[index]) return;

  currentIndex = index;
  const photo = currentAlbum[index];

  viewerEmpty.style.display = 'none';
  mainPhoto.style.display = 'block';
  mainPhoto.src = photo.src;
  mainPhoto.alt = photo.SUBTIPO || photo.TIPO || 'Foto seleccionada';

  document.querySelectorAll('.thumb-strip img').forEach((img, i) => {
    img.classList.toggle('active', i === index);
  });
}

mainPhoto.addEventListener('error', () => {
  mainPhoto.style.display = 'none';
  viewerEmpty.style.display = 'block';
  viewerEmpty.textContent = 'Foto no encontrada';
});

viewerStage.addEventListener('mousemove', (e) => {
  if (!mainPhoto.src || mainPhoto.style.display === 'none') return;

  const rect = viewerStage.getBoundingClientRect();
  const x = (e.clientX - rect.left) / rect.width;
  const y = (e.clientY - rect.top) / rect.height;

  const rotateY = (x - 0.5) * 18;
  const rotateX = (0.5 - y) * 18;

  mainPhoto.style.transform = `
    rotateX(${rotateX}deg)
    rotateY(${rotateY}deg)
    scale(1.03)
  `;
});

viewerStage.addEventListener('mouseleave', () => {
  mainPhoto.style.transform = 'rotateX(0deg) rotateY(0deg) scale(1)';
});

loadPhotos();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Artemisa Marble - 3D Viewer</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/4.0.35/fancybox.min.css"/>
<style>
body { font-family: 'Inter', sans-serif; margin:0; padding:0; background:#f8f8f8;}
header { background:#000; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;}
header nav a { color:#fff; margin:0 12px; text-decoration:none; font-weight:500; }
header nav a:hover { text-decoration:underline; }

.filters { text-align:center; margin:20px 0; }
.filters button { padding:10px 20px; margin:5px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:4px; transition:0.3s;}
.filters button.active, .filters button:hover { background:#f15a24; }

.grid { column-count: 4; column-gap: 10px; max-width:1200px; margin:0 auto; }
.grid-item { break-inside: avoid; margin-bottom:10px; cursor:pointer; }
.grid-item img { width:100%; border-radius:6px; transition:0.3s; }
.grid-item img:hover { transform:scale(1.05); }

/* Modal 3D Viewer */
#viewerModal {
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.95);
  z-index:9999;
  cursor: grab;
  overflow:hidden;
}
#viewerModal img {
  position:absolute;
  top:50%; left:50%;
  transform: translate(-50%,-50%) scale(1);
  max-width:90%;
  max-height:90%;
  transition: transform 0.1s ease-out;
  will-change: transform;
  border-radius:6px;
}
#viewerModal #closeModal {
  position:absolute; top:20px; right:20px;
  font-size:40px; color:white; cursor:pointer;
  z-index:10000;
}
@media(max-width:900px){ .grid { column-count: 2; } }
@media(max-width:600px){ .grid { column-count: 1; } }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="/artemisamarbleandcabinet/logo.png" height="100"></div>
  <nav>
    <a href="/artemisamarbleandcabinet/">Home</a>
    <a href="/artemisamarbleandcabinet/kitchen/">Kitchen</a>
    <a href="/artemisamarbleandcabinet/bathroom/">Bathroom</a>
    <a href="/artemisamarbleandcabinet/cabinets/">Cabinets</a>
    <a href="/artemisamarbleandcabinet/closets">Closets</a>
    <a href="/artemisamarbleandcabinet/contacts">Contact</a>
    <a class="portal-btn" href="https://marbleartemisa.github.io/sop-site/">Portal-SOP</a>
  </nav>
</header>

<div class="filters">
  <button class="filter-btn active" data-category="all">All</button>
  <button class="filter-btn" data-category="Kitchen">Kitchen</button>
  <button class="filter-btn" data-category="Bathroom">Bathroom</button>
  <button class="filter-btn" data-category="Cabinets">Cabinets</button>
  <button class="filter-btn" data-category="Closets">Closets</button>
</div>

<div class="grid" id="gallery"></div>

<!-- Modal Viewer -->
<div id="viewerModal">
  <div id="closeModal">&times;</div>
  <img src="" id="modalImg">
</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";
let photos = [];

const gallery = document.getElementById('gallery');
const filtersContainer = document.querySelector('.filters');
const viewerModal = document.getElementById('viewerModal');
const modalImg = document.getElementById('modalImg');
const closeModal = document.getElementById('closeModal');

async function loadPhotos(){
  const res = await fetch(API);
  const data = await res.json();
  photos = data.filter(item => !item.PARENTCHILD);
  createFilters();
  renderGallery();
}

function createFilters(){
  const categories = [...new Set(photos.map(p=>p.TIPO).filter(Boolean))];
  filtersContainer.innerHTML = `<button class="filter-btn active" data-category="all">All</button>`;
  categories.forEach(c=>{
    const btn = document.createElement('button');
    btn.className = "filter-btn"; btn.dataset.category = c; btn.textContent = c;
    filtersContainer.appendChild(btn);
  });
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery(btn.dataset.category);
    });
  });
}

function renderGallery(category='all'){
  gallery.innerHTML='';
  photos.forEach(p=>{
    if(category==='all' || p.TIPO===category){
      const item = document.createElement('div');
      item.className = "grid-item";
      let fileId = null;
      if(p.LINK.includes("drive.google.com")){
        const match = p.LINK.match(/id=([^&]+)/);
        if(match) fileId = match[1];
      }
      const thumb = fileId ? `https://drive.google.com/thumbnail?id=${fileId}&sz=w800` : p.LINK;
      const full = fileId ? `https://drive.google.com/uc?export=view&id=${fileId}` : p.LINK;
      item.innerHTML = `<img src="${thumb}" data-full="${full}" loading="lazy">`;
      gallery.appendChild(item);

      // click → abrir modal
      item.querySelector('img').addEventListener('click', e=>{
        openModal(e.target.dataset.full);
      });
    }
  });
}

// --- Modal logic ---
let scale = 1, posX=0, posY=0, isDragging=false, startX=0, startY=0;

function openModal(src){
  modalImg.src = src;
  viewerModal.style.display = 'block';
  scale = 1; posX=0; posY=0;
  modalImg.style.transform = 'translate(-50%,-50%) scale(1)';
}

closeModal.onclick = ()=> viewerModal.style.display='none';

// Dragging
viewerModal.onmousedown = e=>{
  isDragging=true;
  startX=e.clientX-posX;
  startY=e.clientY-posY;
  viewerModal.style.cursor='grabbing';
}
viewerModal.onmouseup = e=>{
  isDragging=false;
  viewerModal.style.cursor='grab';
}
viewerModal.onmousemove = e=>{
  if(isDragging){
    posX = e.clientX - startX;
    posY = e.clientY - startY;
    modalImg.style.transform = `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;
  }
}

// Zoom
viewerModal.onwheel = e=>{
  e.preventDefault();
  const delta = e.deltaY<0?0.1:-0.1;
  scale += delta;
  if(scale<0.5) scale=0.5;
  if(scale>5) scale=5;
  modalImg.style.transform = `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale})`;
}

// Slight rotation effect (3D feel)
viewerModal.onmousemove = e=>{
  const rect = modalImg.getBoundingClientRect();
  const centerX = rect.left + rect.width/2;
  const centerY = rect.top + rect.height/2;
  const rotY = (e.clientX-centerX)/30;
  const rotX = -(e.clientY-centerY)/30;
  modalImg.style.transform = `translate(calc(-50% + ${posX}px), calc(-50% + ${posY}px)) scale(${scale}) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
}

loadPhotos();
</script>
</body>
</html>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";

let allData = [];
let photos = [];

const gallery = document.getElementById('gallery');

async function loadPhotos(){

const res = await fetch(API);
const data = await res.json();

allData = data;

// SOLO FOTOS PRINCIPALES (sin PARENTCHILD)
photos = data.filter(item => !item.PARENTCHILD);

renderGallery();

}

function renderGallery(category='all'){

gallery.innerHTML='';

photos.forEach(p=>{

if(category === 'all' || p.TIPO === category){

const item = document.createElement('div');
item.classList.add('grid-item');

item.innerHTML = `
<a data-fancybox="gallery-${p.ID}" href="${p.LINK}">
<img src="${p.LINK}" loading="lazy">
</a>
`;

gallery.appendChild(item);

// agregar fotos relacionadas
allData
.filter(x => x.PARENTCHILD == p.ID)
.forEach(rel => {

const hidden = document.createElement('a');

hidden.href = rel.LINK;
hidden.setAttribute('data-fancybox', `gallery-${p.ID}`);
hidden.style.display = "none";

item.appendChild(hidden);

});

}

});

}

// filtros
document.querySelectorAll('.filter-btn').forEach(btn=>{
btn.addEventListener('click',()=>{
document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
btn.classList.add('active');
renderGallery(btn.dataset.category);
});
});

loadPhotos();

</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Artemisa Marble - 3D Viewer</title>
<style>
body { margin:0; font-family:'Inter', sans-serif; background:#f8f8f8; }
header { background:#000; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;}
header nav a { color:#fff; margin:0 12px; text-decoration:none; font-weight:500; }
header nav a:hover { text-decoration:underline; }

.filters { text-align:center; margin:20px 0; }
.filters button { padding:10px 20px; margin:5px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:4px; transition:0.3s;}
.filters button.active, .filters button:hover { background:#f15a24; }

.grid { column-count: 4; column-gap: 10px; max-width:1200px; margin:0 auto; }
.grid-item { break-inside: avoid; margin-bottom:10px; cursor:pointer; }
.grid-item img { width:100%; border-radius:6px; transition: transform 0.3s ease, box-shadow 0.3s ease; }

#viewer3D {
  display:none;
  position:fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.95); z-index:9999;
}
#close3D {
  position:absolute; top:20px; right:20px; font-size:30px; color:white; cursor:pointer; z-index:1000;
}
</style>
</head>
<body>

<header>
  <div class="logo"><img src="/artemisamarbleandcabinet/logo.png" height="100"></div>
  <nav>
    <a href="/">Home</a>
    <a href="/kitchen/">Kitchen</a>
    <a href="/bathroom/">Bathroom</a>
    <a href="/cabinets/">Cabinets</a>
    <a href="/closets">Closets</a>
    <a href="/contacts">Contact</a>
    <a class="portal-btn" href="https://marbleartemisa.github.io/sop-site/">Portal-SOP</a>
  </nav>
</header>

<div class="filters">
  <button class="filter-btn active" data-category="all">All</button>
  <button class="filter-btn" data-category="Kitchen">Kitchen</button>
  <button class="filter-btn" data-category="Bathroom">Bathroom</button>
  <button class="filter-btn" data-category="Cabinets">Cabinets</button>
  <button class="filter-btn" data-category="Closets">Closets</button>
</div>

<div class="grid" id="gallery"></div>

<!-- 3D Viewer -->
<div id="viewer3D">
  <div id="close3D">&times;</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/controls/OrbitControls.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";
let allData = [], photos = [];
const gallery = document.getElementById('gallery');
const viewer3D = document.getElementById('viewer3D');
const close3D = document.getElementById('close3D');
const filtersContainer = document.querySelector('.filters');

async function loadPhotos() {
  const res = await fetch(API);
  const data = await res.json();
  allData = data;
  photos = data.filter(item => !item.PARENTCHILD);
  renderGallery();
}

function renderGallery() {
  gallery.innerHTML = '';
  photos.forEach(p => {
    let fileId = null;
    if(p.LINK.includes("drive.google.com")){
      const match = p.LINK.match(/id=([^&]+)/);
      if(match) fileId = match[1];
    }
    let full = p.LINK;
    if(fileId) full = `https://drive.google.com/uc?export=view&id=${fileId}`;
    
    const item = document.createElement('div');
    item.classList.add('grid-item');
    item.innerHTML = `<img src="${full}" alt="Foto" loading="lazy">`;
    gallery.appendChild(item);

    item.querySelector('img').addEventListener('click', ()=>{
      open3D(full);
    });
  });
}

function open3D(imgUrl) {
  viewer3D.style.display = 'block';
  viewer3D.innerHTML = '<div id="close3D">&times;</div>';

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 3;

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  viewer3D.appendChild(renderer.domElement);

  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableZoom = true;
  controls.enablePan = true;
  controls.enableDamping = true;
  controls.dampingFactor = 0.1;
  controls.rotateSpeed = 0.5;

  const light = new THREE.AmbientLight(0xffffff, 1);
  scene.add(light);

  const loader = new THREE.TextureLoader();
  loader.crossOrigin = "anonymous";
  loader.load(imgUrl, function(texture){
    const ratio = texture.image.height / texture.image.width;
    const geometry = new THREE.PlaneGeometry(2, 2 * ratio);
    const material = new THREE.MeshBasicMaterial({ map: texture, side: THREE.DoubleSide });
    const plane = new THREE.Mesh(geometry, material);
    scene.add(plane);

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  });

  viewer3D.querySelector('#close3D').onclick = () => {
    viewer3D.style.display = 'none';
    viewer3D.innerHTML = '';
  };
}

loadPhotos();
</script>
</body>
</html>

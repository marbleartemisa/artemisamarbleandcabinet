<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Artemisa Marble - 3D Viewer</title>

<!-- Fancybox -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/4.0.35/fancybox.min.css"/>
<style>
body { font-family: 'Inter', sans-serif; margin:0; padding:0; background:#f8f8f8;}
header { background:#000; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; align-items:center;}
header nav a { color:#fff; margin:0 12px; text-decoration:none; font-weight:500; }
header nav a:hover { text-decoration:underline; }

.filters { text-align:center; margin:20px 0; }
.filters button { padding:10px 20px; margin:5px; border:none; background:#222; color:#fff; cursor:pointer; border-radius:4px; transition:0.3s;}
.filters button.active, .filters button:hover { background:#f15a24; }

.grid { column-count: 4; column-gap: 10px; max-width:1200px; margin:0 auto; }
.grid-item { break-inside: avoid; margin-bottom:10px; cursor:pointer; }
.grid-item img { width:100%; border-radius:6px; transition:0.3s; }
.grid-item img:hover { transform:scale(1.05); }

/* 3D Viewer Overlay */
#viewer3D { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:9999; }
#viewer3D canvas { display:block; }
#close3D { position:absolute; top:20px; right:20px; color:white; font-size:30px; cursor:pointer; z-index:10000; }

/* Responsive */
@media(max-width:900px){ .grid { column-count: 2; } }
@media(max-width:600px){ .grid { column-count: 1; } }
</style>
</head>
<body>

<header>
  <div class="logo"><img src="/artemisamarbleandcabinet/logo.png" height="100"></div>
  <nav>
    <a href="/">Home</a>
    <a href="/kitchen/">Kitchen</a>
    <a href="/bathroom/">Bathroom</a>
    <a href="/cabinets/">Cabinets</a>
    <a href="/closets">Closets</a>
    <a href="/contacts">Contact</a>
    <a class="portal-btn" href="https://marbleartemisa.github.io/sop-site/">Portal-SOP</a>
  </nav>
</header>

<div class="filters">
  <button class="filter-btn active" data-category="all">All</button>
  <button class="filter-btn" data-category="Kitchen">Kitchen</button>
  <button class="filter-btn" data-category="Bathroom">Bathroom</button>
  <button class="filter-btn" data-category="Cabinets">Cabinets</button>
  <button class="filter-btn" data-category="Closets">Closets</button>
</div>

<div class="grid" id="gallery"></div>

<!-- 3D Viewer -->
<div id="viewer3D">
  <div id="close3D">&times;</div>
</div>

<!-- Scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/fancybox/4.0.35/fancybox.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.min.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";

let allData = [];
let photos = [];

const gallery = document.getElementById('gallery');
const filtersContainer = document.querySelector('.filters');
const viewer3D = document.getElementById('viewer3D');
const close3D = document.getElementById('close3D');

const priorityOrder = ["Kitchen","Bathroom","Laundry","Closets & Shelves","Outdoor","BBQ Area","Office","Powder Room","Fireplace","Wall TV","Front desk"];

async function loadPhotos(){
  const res = await fetch(API);
  const data = await res.json();
  allData = data;
  photos = data.filter(item => !item.PARENTCHILD);
  createFilters();
  renderGallery();
}

function createFilters(){
  const tipos = [...new Set(photos.map(p => p.TIPO).filter(Boolean))];
  tipos.sort((a,b)=>{
    const ia = priorityOrder.indexOf(a); const ib = priorityOrder.indexOf(b);
    if(ia === -1 && ib === -1) return a.localeCompare(b);
    if(ia === -1) return 1;
    if(ib === -1) return -1;
    return ia - ib;
  });
  filtersContainer.innerHTML = `<button class="filter-btn active" data-category="all">All</button>`;
  tipos.forEach(tipo=>{
    const btn = document.createElement('button');
    btn.className = "filter-btn"; btn.dataset.category = tipo; btn.textContent = tipo;
    filtersContainer.appendChild(btn);
  });
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      renderGallery(btn.dataset.category);
    });
  });
}


function renderGallery(category='all'){

gallery.innerHTML='';

photos.forEach(p=>{

if(category === 'all' || p.TIPO === category){

const item = document.createElement('div');
item.classList.add('grid-item');

// extraer ID de drive
let fileId = null;

if(p.LINK.includes("drive.google.com")){
const match = p.LINK.match(/id=([^&]+)/);
if(match) fileId = match[1];
}

// URLs correctas para Drive
let thumb = p.LINK;
let full = p.LINK;

if(fileId){
thumb = `https://drive.google.com/thumbnail?id=${fileId}&sz=w1000`;
full  = `https://drive.google.com/uc?export=download&id=${fileId}`;
}

item.innerHTML = `
<a data-fancybox="gallery-${p.ID}" href="${full}">
<img src="${thumb}" loading="lazy">
</a>
`;

gallery.appendChild(item);

}

});

}


  
  
function open3D(imgSrc){
  viewer3D.style.display = 'block';

  // Limpiar antes
  viewer3D.innerHTML = '<div id="close3D">&times;</div>';

  const closeBtn = viewer3D.querySelector('#close3D');
  closeBtn.addEventListener('click', ()=> viewer3D.style.display='none');

  // Three.js
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  viewer3D.appendChild(renderer.domElement);

  // Luz
  const light = new THREE.DirectionalLight(0xffffff,1);
  light.position.set(0,1,1).normalize();
  scene.add(light);

  // Textura
  const loader = new THREE.TextureLoader();
  loader.load(imgSrc, texture=>{
    const geometry = new THREE.PlaneGeometry(4,4*texture.image.height/texture.image.width);
    const material = new THREE.MeshPhongMaterial({map:texture});
    const plane = new THREE.Mesh(geometry, material);
    scene.add(plane);
    camera.position.z = 5;

    function animate(){
      requestAnimationFrame(animate);
      plane.rotation.y += 0.01; // rotación suave
      renderer.render(scene, camera);
    }
    animate();
  });
}

loadPhotos();
</script>
</body>
</html>

function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
  
function openBatchWizard(){

async function uploadWizard(){

  const files = document.getElementById("wizFiles").files;

  if(files.length === 0){
    alert("Selecciona archivos primero");
    return;
  }

  const btn = document.querySelector("#wizardModal button[onclick='uploadWizard()']");
  if(btn){
    btn.innerText = "Subiendo...";
    btn.disabled = true;
  }

  let errores = [];
  let exitos = 0;

  for(const file of files){

    try{

      // 🔴 VALIDACIÓN DE TAMAÑO (CLAVE)
      if(file.size > 3.5 * 1024 * 1024){
        errores.push(file.name + " (demasiado grande)");
        continue;
      }

      const base64 = await fileToBase64(file);

      const payload = {
        file: base64,
        fileName: file.name,
        STONE: document.getElementById("wSTONE").value,
        PROYECTOID: document.getElementById("wPROYECTOID").value, // ✅ CORRECTO
        MEMO: document.getElementById("wMEMO").value,
        TIPO: document.getElementById("wTIPO").value,
        SUBTIPO: document.getElementById("wSUBTIPO").value
      };

         const res = await fetch(API, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        
              
      const data = await res.json();

      if(!data.success){
        throw new Error(data.error || "Error en servidor");
      }

      exitos++;

    }catch(err){
      console.error("ERROR SUBIENDO:", file.name, err);
      errores.push(file.name);
    }
  }

  // 🔥 RESULTADO FINAL
  let mensaje = `Subidos: ${exitos}`;

  if(errores.length){
    mensaje += `\nErrores:\n` + errores.join("\n");
  }

  alert(mensaje);

  if(btn){
    btn.innerText = "🚀 Upload";
    btn.disabled = false;
  }

  closeWizard();
}


function goStep2(){
  document.getElementById("step1").style.display = "none";
  document.getElementById("step2").style.display = "block";
}

function goStep3(){
  document.getElementById("step2").style.display = "none";

  }

  document.getElementById("preview").innerHTML = html;
}


function closeWizard(){
  document.body.style.overflow = "auto";
  document.getElementById("wizardModal").remove();

  function nextStep(step){

  document.getElementById("wizardStep1").style.display = step === 1 ? "block":"none";
  document.getElementById("wizardStep2").style.display = step === 2 ? "block":"none";
  document.getElementById("wizardStep3").style.display = step === 3 ? "block":"none";

  document.getElementById("step1").style.color = step >= 1 ? "#f15a24":"#000";
  document.getElementById("step2").style.color = step >= 2 ? "#f15a24":"#000";
  document.getElementById("step3").style.color = step >= 3 ? "#f15a24":"#000";

  if(step === 3){
    const files = document.getElementById("wizFiles").files;
    let html = "";
    for(let f of files){
      html += "📄 " + f.name + "<br>";
    }
    document.getElementById("previewList").innerHTML = html;
  }
}

/* =========================

========================= */
async function uploadBatch(){

  const base = {

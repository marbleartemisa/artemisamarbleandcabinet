function fileToBase64(file){
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadWizard(){
  
const files = document.getElementById("wizFiles").files;
const preview = document.getElementById("preview");

if(files.length === 0){
  alert("Selecciona archivos primero");
  return;
}

// limpiar preview para usarlo como progreso
preview.innerHTML = "";

let errores = 0;
let exitos = 0;

for(const file of files){

  // crear fila visual
  const row = document.createElement("div");
  row.style.marginBottom = "10px";

  row.innerHTML = `
    <div style="font-size:13px;margin-bottom:4px;">${file.name}</div>

    
    <div style="
      height:6px;
      background:#eee;
      border-radius:4px;
      overflow:hidden;
    ">
      <div style="
        height:100%;
        width:0%;
        background:#f15a24;
        transition:0.3s;
      "></div>
    </div>
  `;

  preview.appendChild(row);

 const bar = row.querySelector("div div:nth-child(1)");
  try{

    if(file.size > 2.5 * 1024 * 1024){
      bar.style.width = "100%";
      bar.style.background = "red";
      errores++;
      continue;
    }

    const base64 = await fileToBase64(file);

    bar.style.width = "40%";

    const payload = {
      file: base64,
      fileName: file.name,
      STONE: document.getElementById("wSTONE").value,
      PROYECTOID: document.getElementById("wPROYECTOID").value,
      MEMO: document.getElementById("wMEMO").value,
      TIPO: document.getElementById("wTIPO").value,
      SUBTIPO: document.getElementById("wSUBTIPO").value
    };

    const res = await fetch(API, {
      method: "POST",
      headers: { "Content-Type":"application/json" },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if(!data.success){
      throw new Error();
    }

    bar.style.width = "100%";
    bar.style.background = "green";

    exitos++;

  }catch(err){

    bar.style.width = "100%";
    bar.style.background = "red";

    errores++;
  }
}

// resultado final
alert(`✅ ${exitos} subidos\n❌ ${errores} errores`);

closeWizard();
}

}

  }
}

function initDropZone(){

  const drop = document.getElementById("dropZone");
  const input = document.getElementById("wizFiles");

  if(!drop || !input) return;

  // CLICK
  drop.addEventListener("click", () => {
    input.click();
  });

  // DRAG OVER
  drop.addEventListener("dragover", (e)=>{
    e.preventDefault();
    drop.style.borderColor = "#f15a24";
    drop.style.background = "#fff3ee";
  });

  // DRAG LEAVE
  drop.addEventListener("dragleave", ()=>{
    drop.style.borderColor = "#ccc";
    drop.style.background = "#fafafa";
  });

  // DROP (FIX REAL)
  drop.addEventListener("drop", (e)=>{
    e.preventDefault();

    const files = e.dataTransfer.files;

    // 👇 HACK correcto para asignar archivos
    const dt = new DataTransfer();

    for(let f of files){
      dt.items.add(f);
    }

    input.files = dt.files;

    drop.style.borderColor = "#ccc";
    drop.style.background = "#fafafa";

    console.log("Archivos cargados:", input.files.length);
  });

}

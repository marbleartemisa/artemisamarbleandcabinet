<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería Artemisa Marble - Viewer Pro</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.css"/>

<style>
body { font-family: 'Inter', sans-serif; margin:0; background:#f8f8f8; }

/* HEADER */
header {
  background:#000;
  color:#fff;
  padding:12px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header nav a {
  color:#fff;
  margin:0 10px;
  text-decoration:none;
}

/* BOTONES FILTROS */
.filters {
  text-align:center;
  margin:15px;
}

.filters button {
  padding:10px 15px;
  margin:5px;
  border:none;
  background:#222;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.filters button.active,
.filters button:hover {
  background:#f15a24;
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
  grid-auto-rows:8px;
  gap:12px;
  max-width:1200px;
  margin:auto;
  padding:10px;
}

.grid-item {
  position:relative;
  overflow:hidden;
  border-radius:10px;
}

/* IMAGEN */
.grid-item img {
  width:100%;
  display:block;
  filter:blur(10px);
  transform:scale(1.05);
  opacity:0;
  transition:0.3s;
}

.grid-item img.loaded {
  filter:blur(0);
  opacity:1;
  transform:scale(1);
}

/* FORM */
.form-group {
  display:flex;
  flex-direction:column;
  margin-bottom:10px;
}

.form-group input,
.form-group textarea {
  padding:8px;
  border:1px solid #ddd;
  border-radius:6px;
}

/* MODAL FADE */
#editModal, #batchModal {
  opacity:0;
  transition:0.2s;
}

#editModal.show,
#batchModal.show {
  opacity:1;
}

.grid-2 {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
  
<button onclick="openBatchWizard()" style="
  padding:10px 14px;
  background:#f15a24;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
">
📦 Project Batch Upload
</button>
  
  
</style>
</head>

<body>

<header>
  <div class="logo">
    <img src="/artemisamarbleandcabinet/logo.png" height="80">
  </div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Kitchen</a>
    <a href="#">Bathroom</a>
  </nav>

  <button onclick="openBatchUpload()" style="
    background:#f15a24;
    border:none;
    padding:10px 14px;
    color:#fff;
    border-radius:6px;
    cursor:pointer;
  ">
    📦 Upload Batch
  </button>
</header>

<!-- SEARCH -->
<div style="text-align:center;margin:10px;">
  <input id="searchBox" placeholder="Search..." style="padding:10px;width:300px;">
</div>

<div class="filters"></div>

<div class="grid" id="gallery"></div>

<script src="https://cdn.jsdelivr.net/npm/@fancyapps/ui/dist/fancybox.umd.js"></script>

<script>
const API = "https://script.google.com/macros/s/AKfycbwGGvL1ox8ZXJ08fRxKXgyJHQxzDOfwnCfpxcabCGJht5dh6R5ViTAeiGPQfa0LAXB2/exec";

let photos = [];
let isSearching = false;
let isAdmin = false;
const gallery = document.getElementById("gallery");

/* =========================
   SEARCH
========================= */
searchBox.addEventListener("input", (e) => {
  const val = e.target.value.toLowerCase();
  isSearching = val.length > 0;
  renderSearch(val);
});

/* =========================
   RENDER SEARCH
========================= */
function renderSearch(q){

  gallery.innerHTML = "";

  if(!q){
    isSearching = false;
    renderGallery();
    return;
  }

  const filtered = photos.filter(p=>{
    const txt = `
      ${p.STONE||''}
      ${p.MEMO||''}
      ${p.COLOURS||''}
      ${p.MATERIALES||''}
      ${p.TIPO||''}
      ${p.SUBTIPO||''}
    `.toLowerCase();

    return q.split(" ").every(w=>txt.includes(w));
  });

  draw(filtered);
}

function openBatchWizard(){

  const html = `
  <div id="wizardModal" style="
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;justify-content:center;align-items:center;
    z-index:99999;
  ">

    <div style="
      background:#fff;
      width:600px;
      border-radius:14px;
      padding:20px;
      max-height:90vh;
      overflow:auto;
    ">

      <h2>📦 Project Batch Upload</h2>

      <!-- STEP INDICATOR -->
      <div style="display:flex;justify-content:space-between;margin:15px 0;">
        <div id="step1" style="font-weight:bold;color:#f15a24;">1. Files</div>
        <div id="step2">2. Project Info</div>
        <div id="step3">3. Upload</div>
      </div>

      <!-- STEP 1 -->
      <div id="wizardStep1">
        <input type="file" id="wizFiles" multiple style="width:100%;">
        <button onclick="nextStep(2)" style="margin-top:15px;width:100%;padding:10px;background:#000;color:#fff;border:none;">
          Next →
        </button>
      </div>

      <!-- STEP 2 -->
      <div id="wizardStep2" style="display:none;">

        <div class="form-group">
          <label>STONE</label>
          <input id="wSTONE">
        </div>

        <div class="form-group">
          <label>PROYECTOID</label>
          <input id="wPROYECTOID">
        </div>

        <div class="form-group">
          <label>MEMO</label>
          <textarea id="wMEMO"></textarea>
        </div>

        <div class="grid-2">
          <div class="form-group">
            <label>TIPO</label>
            <input id="wTIPO">
          </div>
          <div class="form-group">
            <label>SUBTIPO</label>
            <input id="wSUBTIPO">
          </div>
        </div>

        <button onclick="nextStep(3)" style="width:100%;padding:10px;background:#000;color:#fff;border:none;">
          Next →
        </button>
      </div>

      <!-- STEP 3 -->
      <div id="wizardStep3" style="display:none;">

        <p>📸 Files ready to upload</p>
        <div id="previewList" style="font-size:12px;color:#555;"></div>

        <button onclick="uploadWizard()" style="
          width:100%;
          margin-top:15px;
          padding:12px;
          background:#f15a24;
          color:#fff;
          border:none;
          border-radius:8px;
        ">
          🚀 Upload All
        </button>

        <button onclick="closeWizard()" style="width:100%;margin-top:10px;">
          Cancel
        </button>

      </div>

    </div>
  </div>
  `;

  document.body.insertAdjacentHTML("beforeend", html);
}

async function uploadWizard(){

  const files = document.getElementById("wizFiles").files;

  const base = {
    STONE: wSTONE.value,
    PROYECTOID: wPROYECTOID.value,
    MEMO: wMEMO.value,
    TIPO: wTIPO.value,
    SUBTIPO: wSUBTIPO.value
  };

  for(const f of files){

    const fd = new FormData();
    fd.append("file", f);

    Object.keys(base).forEach(k=>{
      fd.append(k, base[k]);
    });

    await fetch(API,{method:"POST",body:fd});
  }

  alert("✅ Upload completo");
  closeWizard();
  loadPhotos();
}

  
  function nextStep(step){

  document.getElementById("wizardStep1").style.display = step === 1 ? "block":"none";
  document.getElementById("wizardStep2").style.display = step === 2 ? "block":"none";
  document.getElementById("wizardStep3").style.display = step === 3 ? "block":"none";

  document.getElementById("step1").style.color = step >= 1 ? "#f15a24":"#000";
  document.getElementById("step2").style.color = step >= 2 ? "#f15a24":"#000";
  document.getElementById("step3").style.color = step >= 3 ? "#f15a24":"#000";

  if(step === 3){
    const files = document.getElementById("wizFiles").files;
    let html = "";
    for(let f of files){
      html += "📄 " + f.name + "<br>";
    }
    document.getElementById("previewList").innerHTML = html;
  }
}

function closeWizard(){
  document.getElementById("wizardModal").remove();
}
  
/* =========================
   LOAD
========================= */
async function loadPhotos(){
  const res = await fetch(API);
  photos = await res.json();
  renderGallery();
}

function renderGallery(){
  draw(photos);
}

/* =========================
   DRAW GRID
========================= */
function draw(list){

  gallery.innerHTML = "";

  const frag = document.createDocumentFragment();

  list.forEach(p=>{

    const match = (p.LINK||"").match(/id=([^&]+)/);
    if(!match) return;

    const id = match[1];
    const thumb = `https://lh3.googleusercontent.com/d/${id}=w800`;
    const full = `https://lh3.googleusercontent.com/d/${id}=s0`;

    const div = document.createElement("div");
    div.className = "grid-item";

    div.innerHTML = `
      <a data-fancybox="g" href="${full}">
        <img src="${thumb}">
      </a>
    `;

    frag.appendChild(div);
  });

  gallery.appendChild(frag);

  Fancybox.bind("[data-fancybox='g']", {});
}

/* =========================
   UPLOAD BATCH MODAL
========================= */
function openBatchUpload(){

  const html = `
  <div id="batchModal" style="
    position:fixed;top:0;left:0;width:100%;height:100%;
    background:rgba(0,0,0,0.6);
    display:flex;justify-content:center;align-items:center;
    z-index:9999;
  ">

    <div style="
      background:#fff;
      width:500px;
      padding:20px;
      border-radius:12px;
      max-height:90vh;
      overflow:auto;
    ">

      <h2>📦 Upload Batch</h2>

      <input type="file" id="batchFiles" multiple>

      <div class="grid-2">

        <div class="form-group">
          <label>STONE</label>
          <input id="bSTONE">
        </div>

        <div class="form-group">
          <label>PROYECTO</label>
          <input id="bPROYECTOID">
        </div>

      </div>

      <div class="form-group">
        <label>MEMO</label>
        <textarea id="bMEMO"></textarea>
      </div>

      <button onclick="uploadBatch()" style="
        width:100%;
        padding:12px;
        background:#f15a24;
        color:#fff;
        border:none;
        border-radius:8px;
      ">
        🚀 Subir
      </button>

      <button onclick="document.getElementById('batchModal').remove()"
        style="width:100%;margin-top:10px;">
        Cerrar
      </button>

    </div>
  </div>
  `;

  document.body.insertAdjacentHTML("beforeend", html);
}

/* =========================
   UPLOAD BATCH
========================= */
async function uploadBatch(){

  const files = document.getElementById("batchFiles").files;

  const base = {
    STONE: bSTONE.value,
    PROYECTOID: bPROYECTOID.value,
    MEMO: bMEMO.value
  };

  for(const f of files){

    const fd = new FormData();
    fd.append("file", f);

    Object.keys(base).forEach(k=>{
      fd.append(k, base[k]);
    });

    await fetch(API,{method:"POST",body:fd});
  }

  alert("Listo 🚀");
  document.getElementById("batchModal").remove();
  loadPhotos();
}

window.onload = loadPhotos;
</script>

</body>
</html>
